<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern TimeMapper Core - v3.12.0</title>
    <style>
        :root { --bg: #121212; --paneBg: #f4f4f4; --border: #ccc; --text: #222; --accent: #007acc; }
        
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; background: var(--bg); color: var(--text); }
        
        /* Flexbox architecture for native CSS resizing */
        #app-layout { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        .top-row { display: flex; height: 45vh; min-height: 20vh; flex-shrink: 0; border-bottom: 1px solid var(--border); position: relative; }
        
        .pane { 
            padding: 1rem; 
            box-sizing: border-box; 
            background: var(--paneBg); 
            position: relative;
        }
        
        /* Resizable rules */
        .map-pane { width: 35%; min-width: 15%; resize: horizontal; overflow: auto; border-right: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .media-pane { flex: 1; overflow-x: auto; scroll-snap-type: x mandatory; display: flex; align-items: center; justify-content: center; }
        
        .content-pane { flex: 1; min-height: 20vh; resize: vertical; overflow-y: auto; display: flex; flex-direction: column; position: relative; border-bottom: 1px solid var(--border); }
        
        /* Timeline specific styling */
        .timeline-pane { height: 12vh; min-height: 60px; flex-shrink: 0; padding: 0; background: #e5e5e5; display: flex; flex-direction: column; position: relative;}
        .timeline-scroll-wrapper { width: 100%; height: 100%; overflow-x: auto; overflow-y: hidden; position: relative; display: flex; align-items: center; }
        .timeline-track { min-width: 1200px; width: 100%; height: 2px; background: #999; position: absolute; left: 2%; right: 2%; top: 55%; }
        
        /* Timeline Ruler */
        .timeline-ruler-tick { position: absolute; top: -15px; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .tick-mark { width: 1px; height: 15px; background: #999; }
        .tick-label { font-size: 0.65rem; color: #777; font-weight: bold; margin-bottom: 2px; }

        /* Timeline Markers */
        .timeline-marker { 
            position: absolute; top: 50%; transform: translate(-50%, -50%); 
            width: 14px; height: 14px; border-radius: 50%; background: #666; border: 2px solid #fff; 
            cursor: pointer; transition: all 0.2s ease; z-index: 10;
        }
        .timeline-marker:hover { transform: translate(-50%, -50%) scale(1.3); background: #333; z-index: 15; }
        .timeline-marker.active { width: 18px; height: 18px; background: var(--accent); z-index: 20; box-shadow: 0 0 0 3px rgba(0, 122, 204, 0.3); }
        
        .timeline-label {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            font-size: 0.75rem; color: #222; white-space: nowrap; opacity: 0;
            background: rgba(255, 255, 255, 0.9); padding: 2px 6px; border-radius: 4px; border: 1px solid #ccc;
            pointer-events: none; transition: opacity 0.2s; max-width: 200px; overflow: hidden; text-overflow: ellipsis;
        }
        .timeline-marker:hover .timeline-label, .timeline-marker.active .timeline-label { opacity: 1; font-weight: bold; }

        /* Slide Typography */
        .slide-container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 1rem; flex: 1; }
        .slide-date { color: var(--accent); font-weight: bold; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .slide-title { margin: 0.5rem 0 1rem 0; font-size: 2.5rem; color: #111; }
        .slide-desc { line-height: 1.6; font-size: 1.2rem; color: #333; }
        .slide-meta { margin-top: 2rem; font-size: 0.9rem; color: #666; display: flex; gap: 1rem; border-top: 1px solid #ddd; padding-top: 1rem; }

        /* Side-Mounted Navigation - Reduced footprint */
        .nav-btn-side {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.03); color: #333; border: none;
            width: 30px; height: 80px; font-size: 1.2rem; cursor: pointer;
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; z-index: 50;
        }
        .nav-btn-side:hover { background: rgba(0, 0, 0, 0.15); }
        .nav-btn-side:disabled { opacity: 0.1; cursor: not-allowed; }
        .nav-left { left: 5px; }
        .nav-right { right: 5px; }

        /* Minimalist Overlay Slide Counter */
        .slide-counter { position: absolute; bottom: 8px; right: 12px; font-size: 0.75rem; color: #888; font-weight: bold; user-select: none; }

        /* Vibe Monitor */
        #vibe-monitor {
            position: fixed; top: 15px; right: 15px; width: 500px; height: 400px;
            background: rgba(10, 10, 15, 0.95); border: 1px solid #444; border-radius: 8px;
            display: flex; flex-direction: column; z-index: 9999; color: #eee;
            box-shadow: 0 8px 32px rgba(0,0,0,0.9); backdrop-filter: blur(8px);
            resize: both; overflow: hidden; font-family: 'Courier New', monospace;
        }
        #vibe-header { background: #222; padding: 8px; cursor: move; font-weight: bold; border-bottom: 1px solid #444; display: flex; justify-content: space-between; user-select: none; }
        #vibe-logs { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; line-height: 1.4; word-wrap: break-word; }
        .log-info { color: #8be9fd; }
        .log-success { color: #50fa7b; }
        .log-warn { color: #ffb86c; }
        .log-error { color: #ff5555; font-weight: bold; }
        .log-time { color: #6272a4; margin-right: 5px; }
        .log-pre { background: #111; padding: 8px; border-radius: 4px; color: #f8f8f2; overflow-x: auto; font-size: 11px; margin: 4px 0; border: 1px solid #333; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "preact": "https://esm.sh/preact@10.19.3",
            "preact/hooks": "https://esm.sh/preact@10.19.3/hooks",
            "htm": "https://esm.sh/htm@3.1.1",
            "papaparse": "https://esm.sh/papaparse@5.4.1"
        }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { h, render } from 'preact';
        import { useState, useEffect, useRef } from 'preact/hooks';
        import htm from 'htm';
        import Papa from 'papaparse';

        const html = htm.bind(h);
        const APP_VERSION = 'v3.12.0';

        const TM_CONFIG = {
            timeZone: 'Europe/Athens', 
            paneBackground: '#f5f5f5'
        };

        const useStore = () => {
            const [logs, setLogs] = useState([]);
            const [data, setData] = useState([]);
            const [status, setStatus] = useState('Idle');
            const [activeIndex, setActiveIndex] = useState(0); 

            const addLog = (msg, type = 'info', rawData = null) => {
                const time = new Date().toLocaleTimeString('en-US', { hour12: false });
                setLogs(prev => [...prev, { time, msg, type, rawData }]);
            };

            return { logs, addLog, data, setData, status, setStatus, activeIndex, setActiveIndex };
        };

        const VibeMonitor = ({ logs, status }) => {
            const logEndRef = useRef(null);
            useEffect(() => { logEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [logs]);

            const onDrag = (e) => {
                const monitor = document.getElementById('vibe-monitor');
                let shiftX = e.clientX - monitor.getBoundingClientRect().left;
                let shiftY = e.clientY - monitor.getBoundingClientRect().top;
                const moveAt = (pageX, pageY) => {
                    monitor.style.left = pageX - shiftX + 'px';
                    monitor.style.top = pageY - shiftY + 'px';
                    monitor.style.right = 'auto';
                };
                const onMouseMove = (e) => moveAt(e.pageX, e.pageY);
                document.addEventListener('mousemove', onMouseMove);
                document.onmouseup = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            };

            return html`
                <div id="vibe-monitor">
                    <div id="vibe-header" onMouseDown=${onDrag}>
                        <span>🟢 Vibe-Monitor ${APP_VERSION}</span>
                        <span style="color: #bd93f9">[${status}]</span>
                    </div>
                    <div id="vibe-logs">
                        ${logs.map((l, i) => html`
                            <div key=${i} class="log-${l.type}">
                                <span class="log-time">[${l.time}]</span> ${l.msg}
                                ${l.rawData ? html`<pre class="log-pre">${JSON.stringify(l.rawData, null, 2)}</pre>` : ''}
                            </div>
                        `)}
                        <div ref=${logEndRef}></div>
                    </div>
                </div>
            `;
        };

        // --- ENHANCED TIMELINE COMPONENT WITH RULER ---
        const TimelineScrubber = ({ data, activeIndex, setActiveIndex }) => {
            const validData = data.filter(d => d.startDate);
            if (validData.length === 0) return html`<div style="padding: 1rem;">No temporal data found.</div>`;

            const minTime = validData[0].startDate.getTime();
            const maxTime = validData[validData.length - 1].startDate.getTime();
            const timeRange = maxTime - minTime || 1; 

            // Calculate Ruler Ticks
            const minYear = validData[0].startDate.getFullYear();
            const maxYear = validData[validData.length - 1].startDate.getFullYear();
            const yearSpan = maxYear - minYear;
            
            let step = 1;
            if (yearSpan > 20) step = 5;
            if (yearSpan > 50) step = 10;
            if (yearSpan > 200) step = 50;
            if (yearSpan > 1000) step = 100;

            const rulerTicks = [];
            const startTick = Math.floor(minYear / step) * step;
            for (let y = startTick; y <= maxYear; y += step) {
                if (y < minYear) continue;
                const tickTime = new Date(0);
                tickTime.setFullYear(y, 0, 1);
                
                const percent = 2 + ((tickTime.getTime() - minTime) / timeRange) * 96;
                // Only draw ticks that actually fit within the 2% to 98% padding
                if (percent >= 2 && percent <= 98) {
                    rulerTicks.push(html`
                        <div class="timeline-ruler-tick" style="left: ${percent}%;">
                            <div class="tick-label">${y}</div>
                            <div class="tick-mark"></div>
                        </div>
                    `);
                }
            }

            // Create Event Markers
            const markers = data.map((item, index) => {
                if (!item.startDate) return null;
                const percent = 2 + ((item.startDate.getTime() - minTime) / timeRange) * 96;
                const isActive = index === activeIndex;

                return html`
                    <div 
                        class="timeline-marker ${isActive ? 'active' : ''}" 
                        style="left: ${percent}%;"
                        onClick=${() => setActiveIndex(index)}
                    >
                        <div class="timeline-label">${item.title}</div>
                    </div>
                `;
            });

            return html`
                <div class="timeline-scroll-wrapper" id="tm-scrubber">
                    <div class="timeline-track">
                        ${rulerTicks}
                        ${markers}
                    </div>
                </div>
            `;
        };

        const App = () => {
            const { logs, addLog, data, setData, status, setStatus, activeIndex, setActiveIndex } = useStore();

            useEffect(() => {
                document.documentElement.style.setProperty('--paneBg', TM_CONFIG.paneBackground);
                addLog(`Engine ${APP_VERSION} initialized. Strict Manual Date Formatter Active.`, 'info');
                
                const params = new URLSearchParams(window.location.search);
                let sourceParam = params.get('source');
                const gid = params.get('gid') || '0'; 

                if (!sourceParam) return setStatus('Awaiting Source');

                let fetchUrl = '';
                if (sourceParam.includes('http')) {
                    if (sourceParam.includes('/e/2PACX')) {
                        fetchUrl = sourceParam.split('/pub')[0] + '/pub?output=csv';
                    } else if (sourceParam.includes('/d/')) {
                        const match = sourceParam.match(/\/d\/([a-zA-Z0-9-_]+)/);
                        fetchUrl = `https://docs.google.com/spreadsheets/d/${match[1]}/gviz/tq?tqx=out:csv&gid=${gid}`;
                    } else {
                        fetchUrl = sourceParam; 
                    }
                } else {
                    if (sourceParam.startsWith('2PACX')) {
                        fetchUrl = `https://docs.google.com/spreadsheets/d/e/${sourceParam}/pub?output=csv&gid=${gid}`;
                    } else {
                        fetchUrl = `https://docs.google.com/spreadsheets/d/${sourceParam}/gviz/tq?tqx=out:csv&gid=${gid}`;
                    }
                }

                executeFetch(fetchUrl);
            }, []);

            const executeFetch = async (url) => {
                setStatus('Fetching Data');
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const csvText = await response.text();
                    
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: (results) => {
                            addLog(`Successfully parsed ${results.data.length} rows.`, 'success');
                            validateAndCleanData(results.data);
                        },
                        error: (err) => {
                            addLog(`Parse Error: ${err.message}`, 'error');
                            setStatus('Parse Failed');
                        }
                    });
                } catch (error) {
                    addLog(`Fetch failed: ${error.message}`, 'error');
                    setStatus('Fetch Failed');
                }
            };

            const fuzzyFind = (row, possibleNames) => {
                const keys = Object.keys(row);
                for (let k of keys) {
                    const cleanKey = k.trim().toLowerCase();
                    if (possibleNames.includes(cleanKey)) return row[k] ? row[k].trim() : '';
                }
                return '';
            };

            const parseTimelineDate = (rawStr) => {
                if (!rawStr) return null;
                let s = rawStr.toString().trim();

                if (!isNaN(s) && s > 10000) return new Date((parseFloat(s) - 25569) * 86400 * 1000);

                const euroTimeMatch = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})\s+(\d{1,2}):(\d{2})$/);
                if (euroTimeMatch) {
                    return new Date(parseInt(euroTimeMatch[3]), parseInt(euroTimeMatch[2]) - 1, parseInt(euroTimeMatch[1]), parseInt(euroTimeMatch[4]), parseInt(euroTimeMatch[5]));
                }

                const euroDateMatch = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
                if (euroDateMatch) {
                    return new Date(parseInt(euroDateMatch[3]), parseInt(euroDateMatch[2]) - 1, parseInt(euroDateMatch[1]));
                }

                if (/^-?\d{1,4}$/.test(s)) {
                    let d = new Date(0);
                    d.setFullYear(parseInt(s), 0, 1);
                    d.setHours(0,0,0,0);
                    return d;
                }

                let d = new Date(s);
                if (!isNaN(d.getTime())) return d;

                return null; 
            };

            const validateAndCleanData = (rawData) => {
                setStatus('Processing');
                
                const cleaned = rawData.map((row, index) => {
                    const startRaw = fuzzyFind(row, ['start', 'start date', 'startdate', 'date']);
                    const titleRaw = fuzzyFind(row, ['title', 'headline', 'name']);
                    const descRaw = fuzzyFind(row, ['description', 'text', 'content']);
                    const mediaRaw = fuzzyFind(row, ['media', 'image', 'photo', 'url']);
                    const locRaw = fuzzyFind(row, ['location', 'place', 'coordinates', 'map']);

                    return {
                        id: index,
                        title: titleRaw || `Event ${index + 1}`,
                        startDate: parseTimelineDate(startRaw),
                        rawStart: startRaw,
                        description: descRaw,
                        media: mediaRaw ? mediaRaw.split(',').map(s => s.trim()) : [],
                        location: locRaw || null
                    };
                });

                const sortedData = cleaned.sort((a, b) => {
                    if (!a.startDate) return 1;
                    if (!b.startDate) return -1;
                    return a.startDate.getTime() - b.startDate.getTime();
                });

                setData(sortedData);
                setActiveIndex(0); 
                setStatus('Active');
            };

            /*
             * Bulletproof Date Formatter
             * Mathematically forces DD/MM/YYYY formatting, bypassing all JS locale guesswork
             */
            const formatDate = (dateObj) => {
                if (!dateObj) return 'Unknown Date';
                
                // If it's just a raw historical year
                if (dateObj.getHours() === 0 && dateObj.getMinutes() === 0 && dateObj.getDate() === 1 && dateObj.getMonth() === 0) {
                     return dateObj.getFullYear().toString();
                }

                const dd = dateObj.getDate().toString().padStart(2, '0');
                const mm = (dateObj.getMonth() + 1).toString().padStart(2, '0'); // Months are 0-indexed
                const yyyy = dateObj.getFullYear();
                
                const HH = dateObj.getHours().toString().padStart(2, '0');
                const min = dateObj.getMinutes().toString().padStart(2, '0');

                // Extract offset string dynamically (e.g. GMT+2) and force it to UTC+2
                const tzParts = new Intl.DateTimeFormat('en-GB', { 
                    timeZone: TM_CONFIG.timeZone, timeZoneName: 'shortOffset' 
                }).formatToParts(dateObj);
                
                let tzString = tzParts.find(p => p.type === 'timeZoneName')?.value || 'UTC';
                tzString = tzString.replace('GMT', 'UTC'); // Enforce UTC nomenclature

                return `${dd}/${mm}/${yyyy} ${HH}:${min} ${tzString}`;
            };

            const nextSlide = () => setActiveIndex(prev => Math.min(prev + 1, data.length - 1));
            const prevSlide = () => setActiveIndex(prev => Math.max(prev - 1, 0));

            const activeSlide = data[activeIndex];

            return html`
                ${html`<${VibeMonitor} logs=${logs} status=${status} />`}
                <div id="app-layout">
                    
                    <div class="top-row">
                        <div class="pane map-pane">
                            <div style="color:#555; text-align:center;">
                                <h3>Map Layer</h3>
                                <p>Awaiting Leaflet.js Injection</p>
                                <p style="font-size: 0.8rem; margin-top: 10px;"><i>(Drag right edge to resize)</i></p>
                            </div>
                        </div>
                        
                        <div class="pane media-pane">
                            <div style="color:#555; text-align:center;">
                                <h3>Media Carousel</h3>
                                <p>Awaiting Media Handler</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="pane content-pane">
                        ${data.length === 0 ? html`<p style="color: #666; text-align:center; padding: 2rem;">Loading content...</p>` : html`
                            
                            <button class="nav-btn-side nav-left" onClick=${prevSlide} disabled=${activeIndex === 0}>◀</button>
                            <button class="nav-btn-side nav-right" onClick=${nextSlide} disabled=${activeIndex === data.length - 1}>▶</button>

                            <div class="slide-container" id="slide-${activeSlide.id}">
                                <div class="slide-date">${formatDate(activeSlide.startDate)}</div>
                                <h2 class="slide-title" dangerouslySetInnerHTML=${{__html: activeSlide.title}}></h2>
                                <div class="slide-desc" dangerouslySetInnerHTML=${{__html: activeSlide.description}}></div>
                                
                                <div class="slide-meta">
                                    ${activeSlide.location ? html`<span>📍 ${activeSlide.location}</span>` : ''}
                                    ${activeSlide.media.length > 0 ? html`<span>📸 ${activeSlide.media.length} Media Item(s) Attached</span>` : ''}
                                </div>
                            </div>

                            <div class="slide-counter">Slide ${activeIndex + 1} of ${data.length}</div>
                        `}
                    </div>
                    
                    <div class="timeline-pane">
                        <${TimelineScrubber} data=${data} activeIndex=${activeIndex} setActiveIndex=${setActiveIndex} />
                    </div>
                </div>
            `;
        };

        render(html`<${App} />`, document.getElementById('root'));
    </script>
</body>
</html>
