<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarTiMapper | Build 1.2.1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
    <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root { --emerald: #10b981; }
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        
        /* THE STACK: 35% Map | 55% Content | 10% Timeline */
        #app-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        #map-canvas { height: 35vh; width: 100%; background: #1e293b; z-index: 1; }
        
        #content-pane { 
            height: 55vh; 
            width: 100%; 
            background: #fff; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
        }

        #media-viewport { width: 100%; background: #000; min-height: 250px; display: flex; align-items: center; justify-content: center; }
        #text-viewport { padding: 30px; max-width: 900px; margin: 0 auto; width: 100%; }
        
        #timeline-viewport { height: 10vh; width: 100%; background: #f8fafc; }

        /* BRUTE FORCE ANTI-CAPITALIZATION */
        * { text-transform: none !important; }
        .tl-headline, .tl-content, .tl-text, h1, h2 { text-transform: none !important; }

        #vibe-console { 
            position: fixed; top: 10px; right: 10px; z-index: 9999;
            background: rgba(15, 23, 42, 0.9); color: var(--emerald); 
            border-radius: 6px; font-family: monospace;
            width: 320px; height: 180px; font-size: 10px;
            border: 1px solid #334155; padding: 10px; overflow-y: auto;
            pointer-events: none; opacity: 0.8;
        }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="map-canvas"></div>
    <div id="content-pane">
        <div id="media-viewport"></div>
        <div id="text-viewport">
            <div id="view-date" class="text-emerald-600 font-mono text-xs font-bold mb-2"></div>
            <h1 id="view-title" class="text-3xl font-bold text-slate-900 mb-4">CarTiMapper</h1>
            <div id="view-desc" class="text-slate-700 text-lg leading-relaxed"></div>
        </div>
    </div>
    <div id="timeline-viewport"></div>
</div>

<div id="vibe-console" id="log-box"></div>

<script>
function log(msg) {
    const b = document.getElementById('vibe-console');
    b.innerHTML = `[${new Date().toLocaleTimeString('en-GB')}] ${msg}<br>` + b.innerHTML;
}

const SHEET_ID = new URLSearchParams(window.location.search).get('source') || '1K9kZynV-lGUd-yT6GiGsIabfjF-_k-sn5qAeEONzNIE';

let appMap, appTimeline, dataStore = [];

/**
 * HIGH-PRECISION DATE CONVERTER
 * Handles Google Serial Numbers and String formats into 24h
 */
function processDateTime(val) {
    if (!val) return { y: 2026, m: 1, d: 1, h: 0, min: 0, display: "" };
    
    let date;
    const num = parseFloat(val);
    
    // Google Serial Date detection (Value usually > 30000)
    if (!isNaN(num) && num > 30000) {
        date = new Date((num - 25569) * 86400 * 1000);
    } else {
        date = new Date(val);
    }

    if (isNaN(date.getTime())) return { y: 2026, m: 1, d: 1, h: 0, min: 0, display: String(val) };

    const p = (n) => String(n).padStart(2, '0');
    return {
        y: date.getFullYear(),
        m: date.getMonth() + 1,
        d: date.getDate(),
        h: date.getHours(),
        min: date.getMinutes(),
        display: `${p(date.getDate())}/${p(date.getMonth()+1)}/${date.getFullYear()} ${p(date.getHours())}:${p(date.getMinutes())}`
    };
}

async function initializeApp() {
    log("Stabilizer 1.2.1 Engaged.");
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
    
    Papa.parse(url, {
        download: true, header: true, skipEmptyLines: 'greedy',
        complete: (res) => {
            // Clean keys and parse dates immediately
            dataStore = res.data.map((row, i) => {
                let clean = { _uid: i };
                for (let k in row) clean[k.toLowerCase().replace(/[ "\s]/g, '')] = row[k];
                clean._ts = processDateTime(clean.startdate || clean.year || clean.date);
                return clean;
            }).filter(item => item.title && item.title.trim().length > 0);

            log(`Sync Successful: ${dataStore.length} rows.`);
            renderUI();
        }
    });
}

function renderUI() {
    // 1. Map - Fixed and Dark for contrast
    appMap = L.map('map-canvas', { zoomControl: false }).setView([0,0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(appMap);
    
    dataStore.forEach(item => {
        const la = parseFloat(item.lat), lo = parseFloat(item.lon);
        if (!isNaN(la)) L.circleMarker([la, lo], { radius: 5, color: '#3b82f6', fillOpacity: 0.7 }).addTo(appMap);
    });

    // 2. Timeline - 10% height requires a very minimal config
    const events = dataStore.map(item => ({
        start_date: { year: item._ts.y, month: item._ts.m, day: item._ts.d, hour: item._ts.h, minute: item._ts.min },
        text: { headline: item.title, text: "" }, // Keep timeline clean, text goes to content pane
        unique_id: item._uid
    }));

    // timeline.js: start_at_slide 0 ensures we don't skip the first record
    appTimeline = new TL.Timeline('timeline-viewport', { events }, { 
        height: "100%", 
        start_at_slide: 0,
        initial_zoom: 1,
        timenav_height_percentage: 100 // Use full 10% for the nav
    });
    
    appTimeline.on('change', (e) => {
        const active = dataStore.find(d => d._uid === e.unique_id);
        if (active) updateContent(active);
    });

    // Initial Sync
    setTimeout(() => { 
        appMap.invalidateSize(); 
        if(dataStore[0]) updateContent(dataStore[0]); 
    }, 1000);
}

function updateContent(item) {
    log(`Syncing: ${item.title}`);
    
    // Update Text
    document.getElementById('view-title').innerHTML = item.title;
    document.getElementById('view-desc').innerHTML = item.description || "";
    document.getElementById('view-date').innerText = item._ts.display;
    
    // Update Media
    const media = item.media || item.mediaurl;
    const viewport = document.getElementById('media-viewport');
    viewport.innerHTML = media ? `<img src="${media}" class="max-h-[300px] w-auto object-contain shadow-2xl">` : "";

    // Update Map
    const la = parseFloat(item.lat), lo = parseFloat(item.lon);
    if (!isNaN(la)) appMap.flyTo([la, lo], 12, { animate: true, duration: 1.5 });
}

document.addEventListener('DOMContentLoaded', initializeApp);
</script>
</body>
</html>
