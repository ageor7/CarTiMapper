<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarTiMapper | Build 1.1.5</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
    <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>

    <style>
        :root { --emerald: #34d399; }
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #app-wrapper { display: grid; grid-template-rows: 1fr 340px; height: 100vh; }
        #stage-top { display: grid; grid-template-columns: 1fr 450px; background: #fff; }
        #map-canvas { height: 100%; width: 100%; background: #f1f5f9; }
        #content-panel { padding: 30px; overflow-y: auto; border-left: 1px solid #e2e8f0; }
        #media-viewport { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin-bottom: 1.5rem; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #vibe-console { 
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            background: rgba(15, 23, 42, 0.95); color: var(--emerald); 
            border-radius: 12px; font-family: monospace;
            display: block; width: 420px; height: 300px;
            border: 1px solid #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            resize: both; overflow: hidden;
        }
        #console-header { background: #1e293b; padding: 10px 15px; cursor: move; display: flex; justify-content: space-between; border-bottom: 1px solid #334155; font-size: 11px; }
        #console-body { padding: 12px; font-size: 11px; height: calc(100% - 35px); overflow-y: auto; }
        .log-line { margin-bottom: 4px; border-left: 2px solid #334155; padding-left: 8px; }
        .log-success { color: var(--emerald); }
        .log-error { color: #f87171; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="stage-top">
        <div id="map-canvas"></div>
        <div id="content-panel">
            <div id="media-viewport" class="shadow-inner"><span class="text-slate-500 text-xs">Awaiting Media...</span></div>
            <h1 id="view-title" class="text-3xl font-black text-slate-900 mb-4 tracking-tight">Handshaking...</h1>
            <div id="view-desc" class="text-slate-600 text-lg leading-relaxed"></div>
        </div>
    </div>
    <div id="timeline-viewport"></div>
</div>

<div id="vibe-console">
    <div id="console-header">
        <span class="font-bold">● CarTiMapper_v1.1.5_INTEGRITY</span>
        <button onclick="this.parentElement.parentElement.style.display='none'">✕</button>
    </div>
    <div id="console-body"></div>
</div>

<script>
/**
 * REFINED LOGGING
 */
function log(msg, type = "") {
    const body = document.getElementById('console-body');
    const line = document.createElement('div');
    line.className = `log-line ${type === "error" ? "log-error" : ""} ${type === "success" ? "log-success" : ""}`;
    line.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    body.prepend(line);
}

const DEFAULT_ID = '1K9kZynV-lGUd-yT6GiGsIabfjF-_k-sn5qAeEONzNIE';
const PARAMS = new URLSearchParams(window.location.search);
const SHEET_ID = PARAMS.get('source') || DEFAULT_ID;

let appMap, appTimeline, dataStore = [];

async function initializeApp() {
    log("Starting Polyglot Engine...");
    
    const endpoints = [
        `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`,
        `https://corsproxy.io/?${encodeURIComponent('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv')}`
    ];

    for (const url of endpoints) {
        try {
            log(`Probing: ${url.split('/')[2]}...`);
            const res = await fetch(url);
            if (res.ok) {
                const text = await res.text();
                if (text.length > 100) { 
                    processData(text); 
                    return; 
                }
            }
        } catch (e) { log(`Pipe Fail: ${e.message}`, "error"); }
    }
}

function processData(csvText) {
    const rows = csvText.trim().split(/\r?\n/);
    // SMART HEADERS: Remove spaces and quotes
    const headers = rows[0].split(',').map(h => h.replace(/[ "\s]/g, '').toLowerCase());
    
    dataStore = rows.slice(1).map(rowStr => {
        const matches = rowStr.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
        const entry = {};
        headers.forEach((h, i) => {
            let v = matches[i] ? matches[i].trim().replace(/^"|"$/g, '') : "";
            entry[h] = v;
        });
        return entry;
    });

    log(`Success: ${dataStore.length} rows unified.`, "success");
    renderApp();
}

function renderApp() {
    // 1. Map Initialization
    appMap = L.map('map-canvas', { zoomControl: false }).setView([0,0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(appMap);
    
    // 2. Marker Injection (Detecting lat/lon/latitude/longitude)
    dataStore.forEach(item => {
        const lat = item.lat || item.latitude;
        const lon = item.lon || item.longitude;
        if (lat && lon) {
            L.circleMarker([lat, lon], { radius: 6, fillColor: '#3b82f6', color: '#fff', weight: 2, fillOpacity: 0.9 }).addTo(appMap);
        }
    });

    // 3. Timeline Injection (Mapping varied date headers)
    const events = dataStore.map((item, i) => {
        const yr = item.startdate || item.year || item.start || item.date || 2026;
        return {
            start_date: { year: parseInt(yr) || 2026 },
            text: { headline: item.title || "Untitled Event", text: item.description || "" },
            media: { url: item.media || item.mediaurl || "" },
            unique_id: i
        };
    });

    appTimeline = new TL.Timeline('timeline-viewport', { events }, { height: 340, initial_zoom: 3 });

    // 4. THE HANDSHAKE
    appTimeline.on('change', (e) => {
        const active = dataStore[e.unique_id];
        if (active) updateUI(active);
    });

    // 5. Wake up Call
    setTimeout(() => {
        appMap.invalidateSize();
        if (dataStore.length > 0) updateUI(dataStore[0]);
    }, 500);
}

function updateUI(item) {
    document.getElementById('view-title').innerText = item.title || "No Title";
    document.getElementById('view-desc').innerHTML = item.description || "";
    
    const media = item.media || item.mediaurl;
    const viewport = document.getElementById('media-viewport');
    viewport.innerHTML = media ? `<img src="${media}" class="w-full h-full object-contain">` : `<div class="text-slate-700 text-xs uppercase tracking-widest font-bold">No Media</div>`;

    const lat = item.lat || item.latitude;
    const lon = item.lon || item.longitude;
    if (lat && lon) {
        log(`Focus: ${item.title}`);
        appMap.flyTo([lat, lon], 12, { animate: true });
    }
}

// Draggable Console
const con = document.getElementById("vibe-console");
const head = document.getElementById("console-header");
let dragging = false, ox, oy;
head.onmousedown = (e) => { dragging = true; ox = e.clientX - con.offsetLeft; oy = e.clientY - con.offsetTop; };
document.onmousemove = (e) => { if (dragging) { con.style.left = (e.clientX - ox) + "px"; con.style.top = (e.clientY - oy) + "px"; } };
document.onmouseup = () => dragging = false;

document.addEventListener('DOMContentLoaded', initializeApp);
</script>
</body>
</html>
