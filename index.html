<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarTiMapper | Build 1.2.2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
    <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        /* KILL ALL CAPITALIZATION */
        * { text-transform: none !important; }
        
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: sans-serif; background: #fff; }
        
        #app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        /* 1. MAP (35%) */
        #map-zone { height: 35vh; width: 100%; background: #ddd; z-index: 10; border-bottom: 2px solid #ccc; }
        
        /* 2. CONTENT (55%) */
        #content-zone { 
            height: 55vh; 
            width: 100%; 
            overflow-y: auto; 
            background: #fff;
            padding-bottom: 50px;
        }

        #hero-media { width: 100%; background: #000; min-height: 200px; display: flex; align-items: center; justify-content: center; }
        #hero-text { padding: 25px; max-width: 800px; margin: 0 auto; }
        
        /* 3. TIMELINE (10%) */
        #timeline-zone { height: 10vh; width: 100%; background: #eee; border-top: 2px solid #ccc; }

        /* Monitor Overlay */
        #debug-box { 
            position: fixed; top: 5px; right: 5px; z-index: 9999; 
            background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace;
            font-size: 10px; padding: 10px; border-radius: 5px; width: 300px;
            max-height: 150px; overflow: hidden; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-zone"></div>
    <div id="content-zone">
        <div id="hero-media"></div>
        <div id="hero-text">
            <div id="meta-date" class="text-emerald-600 font-mono text-xs font-bold mb-2"></div>
            <h1 id="meta-title" class="text-3xl font-bold text-slate-900 mb-4">Loading...</h1>
            <div id="meta-desc" class="text-slate-700 text-lg leading-relaxed"></div>
        </div>
    </div>
    <div id="timeline-zone"></div>
</div>

<div id="debug-box" id="logs"></div>

<script>
function log(msg) {
    const b = document.getElementById('debug-box');
    b.innerHTML = `> ${msg}<br>` + b.innerHTML;
}

const SHEET_ID = new URLSearchParams(window.location.search).get('source') || '1K9kZynV-lGUd-yT6GiGsIabfjF-_k-sn5qAeEONzNIE';

let map, timeline, masterData = [];

/**
 * THE CHRONOS ENGINE
 * Accurately parses Google Serial Numbers and standard date strings
 */
function parseUniversalDate(val) {
    if (!val) return { y: 2026, m: 1, d: 1, h: 0, min: 0, str: "" };
    
    let d;
    const n = parseFloat(val);
    
    if (!isNaN(n) && n > 30000) {
        // Handle Google Serial Date
        d = new Date((n - 25569) * 86400 * 1000);
    } else {
        d = new Date(val);
    }

    if (isNaN(d.getTime())) return { y: 2026, m: 1, d: 1, h: 0, min: 0, str: String(val) };

    const pad = (v) => String(v).padStart(2, '0');
    return {
        y: d.getFullYear(),
        m: d.getMonth() + 1,
        d: d.getDate(),
        h: d.getHours(),
        min: d.getMinutes(),
        str: `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`
    };
}

async function start() {
    log("Purge 1.2.2 Initialized");
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
    
    Papa.parse(url, {
        download: true, header: true, skipEmptyLines: 'greedy',
        complete: (res) => {
            masterData = res.data.map((row, i) => {
                let clean = { _id: i };
                for (let k in row) clean[k.toLowerCase().replace(/[ "\s]/g, '')] = row[k];
                clean._date = parseUniversalDate(clean.startdate || clean.year || clean.date);
                return clean;
            }).filter(item => item.title && item.title.trim() !== "");

            log(`Sync: ${masterData.length} records found.`);
            initApp();
        }
    });
}

function initApp() {
    // 1. Map - Standard OSM
    map = L.map('map-zone', { zoomControl: false }).setView([0,0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OSM'
    }).addTo(map);
    
    masterData.forEach(item => {
        const la = parseFloat(item.lat), lo = parseFloat(item.lon);
        if (!isNaN(la)) {
            L.circleMarker([la, lo], { radius: 6, color: '#3b82f6', fillOpacity: 0.8 }).addTo(map);
        }
    });

    // 2. Timeline
    const events = masterData.map(item => ({
        start_date: { 
            year: item._date.y, 
            month: item._date.m, 
            day: item._date.d, 
            hour: item._date.h, 
            minute: item._date.min 
        },
        text: { headline: item.title, text: "" },
        unique_id: item._id
    }));

    timeline = new TL.Timeline('timeline-zone', { events }, { 
        height: "100%", 
        start_at_slide: 0,
        initial_zoom: 1
    });
    
    timeline.on('change', (e) => {
        const active = masterData.find(d => d._id === e.unique_id);
        if (active) refreshView(active);
    });

    // Forced Wake-up
    setTimeout(() => { 
        map.invalidateSize(); 
        if(masterData[0]) refreshView(masterData[0]); 
    }, 1200);
}

function refreshView(item) {
    log(`Viewing: ${item.title}`);
    
    document.getElementById('meta-title').innerHTML = item.title;
    document.getElementById('meta-desc').innerHTML = item.description || "";
    document.getElementById('meta-date').innerText = item._date.str;
    
    const media = item.media || item.mediaurl;
    const hero = document.getElementById('hero-media');
    hero.innerHTML = media ? `<img src="${media}" style="max-height: 40vh; width: auto; object-fit: contain;">` : "";

    const la = parseFloat(item.lat), lo = parseFloat(item.lon);
    if (!isNaN(la)) {
        map.flyTo([la, lo], 13, { animate: true, duration: 2 });
    }
}

document.addEventListener('DOMContentLoaded', start);
</script>
</body>
</html>
