<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern TimeMapper Core - v3.3.0</title>
    <style>
        :root { --bg: #121212; --pane: #1e1e1e; --border: #333; --text: #eee; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; background: var(--bg); color: var(--text); }
        
        #app-grid { display: grid; grid-template-columns: 35% 65%; grid-template-rows: 45vh 45vh 10vh; height: 100vh; }
        .pane { border: 1px solid var(--border); padding: 1rem; box-sizing: border-box; overflow: hidden; }
        
        .map-pane { grid-column: 1; grid-row: 1; background: #1a1a24; }
        .media-pane { grid-column: 2; grid-row: 1; background: #151515; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; align-items: center; justify-content: center; }
        .content-pane { grid-column: 1 / span 2; grid-row: 2; background: var(--pane); overflow-y: auto; }
        .timeline-pane { grid-column: 1 / span 2; grid-row: 3; background: #0a0a0a; display: flex; align-items: center; justify-content: center; }

        #vibe-monitor {
            position: fixed; top: 15px; right: 15px; width: 450px; height: 350px;
            background: rgba(10, 10, 15, 0.95); border: 1px solid #444; border-radius: 8px;
            display: flex; flex-direction: column; z-index: 9999;
            box-shadow: 0 8px 24px rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            resize: both; overflow: hidden; font-family: 'Courier New', monospace;
        }
        #vibe-header { background: #222; padding: 8px; cursor: move; font-weight: bold; border-bottom: 1px solid #444; display: flex; justify-content: space-between; user-select: none; }
        #vibe-logs { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; line-height: 1.4; word-wrap: break-word; }
        
        .log-info { color: #8be9fd; }
        .log-success { color: #50fa7b; }
        .log-warn { color: #ffb86c; }
        .log-error { color: #ff5555; font-weight: bold; }
        .log-time { color: #6272a4; margin-right: 5px; }
    </style>
    
    <script type="importmap">
    {
        "imports": {
            "preact": "https://esm.sh/preact@10.19.3",
            "preact/hooks": "https://esm.sh/preact@10.19.3/hooks",
            "htm": "https://esm.sh/htm@3.1.1",
            "papaparse": "https://esm.sh/papaparse@5.4.1"
        }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { h, render } from 'preact';
        import { useState, useEffect, useRef } from 'preact/hooks';
        import htm from 'htm';
        import Papa from 'papaparse';

        const html = htm.bind(h);
        const APP_VERSION = 'v3.3.0';

        const useStore = () => {
            const [logs, setLogs] = useState([]);
            const [data, setData] = useState([]);
            const [status, setStatus] = useState('Idle');

            const addLog = (msg, type = 'info') => {
                const time = new Date().toLocaleTimeString('en-US', { hour12: false });
                setLogs(prev => [...prev, { time, msg, type }]);
            };

            return { logs, addLog, data, setData, status, setStatus };
        };

        const VibeMonitor = ({ logs, status }) => {
            const logEndRef = useRef(null);

            useEffect(() => { 
                logEndRef.current?.scrollIntoView({ behavior: 'smooth' }); 
            }, [logs]);

            const onDrag = (e) => {
                const monitor = document.getElementById('vibe-monitor');
                let shiftX = e.clientX - monitor.getBoundingClientRect().left;
                let shiftY = e.clientY - monitor.getBoundingClientRect().top;

                const moveAt = (pageX, pageY) => {
                    monitor.style.left = pageX - shiftX + 'px';
                    monitor.style.top = pageY - shiftY + 'px';
                    monitor.style.right = 'auto';
                };

                const onMouseMove = (e) => moveAt(e.pageX, e.pageY);
                document.addEventListener('mousemove', onMouseMove);
                document.onmouseup = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            };

            return html`
                <div id="vibe-monitor">
                    <div id="vibe-header" onMouseDown=${onDrag}>
                        <span>🟢 Vibe-Monitor ${APP_VERSION}</span>
                        <span style="color: #bd93f9">[${status}]</span>
                    </div>
                    <div id="vibe-logs">
                        ${logs.map((l, i) => html`
                            <div key=${i} class="log-${l.type}">
                                <span class="log-time">[${l.time}]</span> ${l.msg}
                            </div>
                        `)}
                        <div ref=${logEndRef}></div>
                    </div>
                </div>
            `;
        };

        const App = () => {
            const { logs, addLog, data, setData, status, setStatus } = useStore();

            useEffect(() => {
                addLog(`Engine ${APP_VERSION} initialized. Using V1-style Fetch.`, 'info');
                
                const params = new URLSearchParams(window.location.search);
                let sourceParam = params.get('source');
                const gid = params.get('gid') || '0'; 

                if (!sourceParam) {
                    addLog('Awaiting ?source=ID in URL.', 'warn');
                    setStatus('Awaiting Source');
                    return;
                }

                let sheetId = sourceParam;
                if (sourceParam.includes('google.com')) {
                    const match = sourceParam.match(/\/d\/([a-zA-Z0-9-_]+)/);
                    if (match && match[1]) {
                        sheetId = match[1];
                        addLog('Extracted ID from full URL successfully.', 'success');
                    }
                }

                addLog(`Targeting Sheet ID: ${sheetId.substring(0, 8)}...`, 'info');
                fetchGoogleSheetData(sheetId, gid);
            }, []);

            /*
             * ------------------------------------------
             * THE V1 LEGACY FETCH STRATEGY
             * ------------------------------------------
             * Reverted to using the `/pub` endpoint and PapaParse's native 
             * XMLHttpRequest downloader, which bypasses modern fetch() CORS traps.
             */
            const fetchGoogleSheetData = (sheetId, gid) => {
                setStatus('Fetching Data');
                
                // Using the legacy "Publish to Web" endpoint
                const pubUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/pub?output=csv&gid=${gid}`;
                addLog(`Connecting to legacy /pub endpoint...`, 'info');

                Papa.parse(pubUrl, {
                    download: true, // Native XHR download
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        // Check if Google returned an HTML error page (like a 404 disguised as 200)
                        if (results.data.length > 0 && results.data[0] && results.data[0]['<!DOCTYPE html>'] !== undefined) {
                            addLog('ERROR: Received HTML instead of CSV.', 'error');
                            addLog('Ensure you clicked "File -> Share -> Publish to Web" in Google Sheets.', 'warn');
                            setStatus('Not Published');
                            return;
                        }
                        
                        addLog(`CSV download success! Parsed ${results.data.length} rows.`, 'success');
                        validateAndCleanData(results.data);
                    },
                    error: (err) => {
                        // If it fails here, it will give us the raw XHR error
                        addLog(`PapaParse Error: ${err.message}`, 'error');
                        setStatus('Fetch Failed');
                    }
                });
            };

            const validateAndCleanData = (rawData) => {
                setStatus('Processing');
                let validCount = 0;
                let missingDates = 0;

                const cleaned = rawData.map((row, index) => {
                    let startDateStr = row['Start'] || row['Start Date'] || '';
                    let parsedDate = null;
                    
                    if (startDateStr) {
                        if (!isNaN(startDateStr) && startDateStr > 10000) {
                            parsedDate = new Date((parseFloat(startDateStr) - 25569) * 86400 * 1000);
                        } else {
                            parsedDate = new Date(startDateStr);
                        }
                    }

                    if (!parsedDate || isNaN(parsedDate)) missingDates++;
                    else validCount++;

                    return {
                        id: index,
                        title: row['Title'] || 'Untitled Event',
                        startDate: parsedDate,
                        rawStart: startDateStr,
                        description: row['Description'] || '',
                        media: row['Media'] ? row['Media'].split(',').map(s => s.trim()) : [],
                        location: row['Location'] || row['Place'] || null
                    };
                });

                setData(cleaned);
                
                if (missingDates > 0) {
                    addLog(`Data strategy: ${validCount} valid, ${missingDates} rows missing Start Dates.`, 'warn');
                } else {
                    addLog(`Data strategy complete. 100% Date Integrity.`, 'success');
                }
                setStatus('Active');
            };

            return html`
                ${html`<${VibeMonitor} logs=${logs} status=${status} />`}
                <div id="app-grid">
                    <div class="pane map-pane">
                        <div style="color:#555">Map Canvas (Ready for Leaflet Injection)</div>
                    </div>
                    <div class="pane media-pane">
                        <div style="color:#555">Media Carousel (Awaiting Media Links)</div>
                    </div>
                    <div class="pane content-pane">
                        <h2>Content Layer v3.3</h2>
                        <p>Currently tracking ${data.length} verified records in Preact state.</p>
                        ${data.length > 0 ? html`
                            <pre style="font-size:11px; color:#aaa; background:#111; padding: 10px; border-radius: 4px; overflow-x: auto;">
                                ${JSON.stringify(data[0], null, 2)}
                            </pre>
                        ` : ''}
                    </div>
                    <div class="pane timeline-pane">
                        <div style="color:#555">SVG Scrubber Bridge (Awaiting Canvas)</div>
                    </div>
                </div>
            `;
        };

        render(html`<${App} />`, document.getElementById('root'));
    </script>
</body>
</html>
