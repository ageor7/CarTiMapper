<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern TimeMapper | Build 1.1.4</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
    <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>

    <style>
        :root { --slate-900: #0f172a; --emerald-400: #34d399; }
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: sans-serif; }
        #app-wrapper { display: grid; grid-template-rows: 1fr 320px; height: 100vh; }
        #stage-top { display: grid; grid-template-columns: 1fr 450px; }
        #map-canvas { height: 100%; width: 100%; background: #e5e7eb; }
        #content-panel { padding: 30px; overflow-y: auto; border-left: 1px solid #cbd5e1; background: #ffffff; }
        #media-viewport { width: 100%; aspect-ratio: 16/9; background: #f1f5f9; border-radius: 12px; margin-bottom: 1.5rem; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #vibe-console { 
            position: fixed; top: 30px; left: 30px; z-index: 9999;
            background: rgba(15, 23, 42, 0.95); color: var(--emerald-400); 
            border-radius: 12px; font-family: monospace;
            display: block; width: 420px; height: 350px;
            border: 1px solid #334155; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            resize: both; overflow: hidden;
        }
        #console-header { background: #1e293b; padding: 10px 15px; cursor: move; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; font-size: 12px; }
        #console-body { padding: 15px; font-size: 11px; height: calc(100% - 110px); overflow-y: auto; }
        #console-footer { padding: 10px; background: #1e293b; border-top: 1px solid #334155; }
        .log-line { margin-bottom: 5px; border-left: 2px solid #334155; padding-left: 10px; }
        .log-error { color: #f87171; border-color: #ef4444; }
        .log-success { color: #34d399; }
        input, textarea { background: #0f172a; border: 1px solid #334155; color: white; padding: 4px 8px; border-radius: 4px; width: 100%; font-size: 10px; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="stage-top">
        <div id="map-canvas"></div>
        <div id="content-panel">
            <div id="media-viewport"><span class="text-slate-400">Media System Offline</span></div>
            <h1 id="view-title" class="text-3xl font-extrabold text-slate-900 mb-4">Awaiting Handshake...</h1>
            <div id="view-desc" class="text-slate-600 text-lg">System is waiting for a valid data stream.</div>
        </div>
    </div>
    <div id="timeline-viewport"></div>
</div>

<div id="vibe-console">
    <div id="console-header">
        <span class="font-bold">● INTEGRITY_MONITOR_v1.1.4</span>
        <button onclick="this.parentElement.parentElement.style.display='none'">✕</button>
    </div>
    <div id="console-body" id="log-anchor"></div>
    <div id="console-footer">
        <p class="text-[9px] text-slate-400 mb-2">NETWORK BLOCKED? Paste CSV Content here:</p>
        <div class="flex gap-2">
            <textarea id="manual-data" placeholder="Paste CSV rows here..." rows="2" class="flex-grow"></textarea>
            <button onclick="manualInfect()" class="bg-emerald-600 text-white text-[10px] px-3 rounded hover:bg-emerald-500">BOOT</button>
        </div>
    </div>
</div>

<script>
/**
 * SYSTEM LOGS
 */
function log(msg, type = "") {
    const body = document.getElementById('console-body');
    const line = document.createElement('div');
    line.className = `log-line ${type === "error" ? "log-error" : ""} ${type === "success" ? "log-success" : ""}`;
    line.innerHTML = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
    body.prepend(line);
}

/**
 * CORE CONFIG
 */
const DEFAULT_ID = '1K9kZynV-lGUd-yT6GiGsIabfjF-_k-sn5qAeEONzNIE';
const PARAMS = new URLSearchParams(window.location.search);
const SHEET_ID = PARAMS.get('source') || DEFAULT_ID;

let appMap, appTimeline, dataStore = [];

async function initializeApp() {
    log("Guardian Engine 1.1.4 Init.");
    
    if (window.location.protocol === 'file:') {
        log("NOTICE: You are running from a local file. Browsers block external data in this mode.", "error");
        log("FIX: Upload to GitHub or use the 'BOOT' box below.", "success");
    }

    const endpoints = [
        `https://corsproxy.io/?${encodeURIComponent('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv')}`,
        `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`
    ];

    for (const url of endpoints) {
        try {
            log(`Probing: ${url.split('/')[2]}...`);
            const res = await fetch(url);
            if (res.ok) {
                const text = await res.text();
                if (text.length > 50) { injectData(text); return; }
            }
        } catch (e) {
            log(`Pipe Error: ${e.message}`, "error");
        }
    }
}

function manualInfect() {
    const val = document.getElementById('manual-data').value;
    if (val.length > 10) {
        log("Manual Overdrive Initiated...", "success");
        injectData(val);
    }
}

function injectData(csvText) {
    dataStore = parseCSV(csvText);
    log(`Success! ${dataStore.length} items ready.`, "success");
    renderUI();
}

function parseCSV(csv) {
    const rows = csv.trim().split(/\r?\n/);
    const headers = rows[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
    return rows.slice(1).map(rowStr => {
        const matches = rowStr.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
        const entry = {};
        headers.forEach((h, i) => {
            let v = matches[i] ? matches[i].trim() : "";
            entry[h] = v.replace(/^"|"$/g, '');
        });
        return entry;
    });
}

function renderUI() {
    if (appMap) return; // Prevent double render
    appMap = L.map('map-canvas', { zoomControl: false }).setView([0,0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(appMap);
    
    dataStore.forEach(item => {
        if (item.lat && item.lon) L.circleMarker([item.lat, item.lon], { radius: 7, fillColor: '#3b82f6', color: '#fff', weight: 2, fillOpacity: 0.9 }).addTo(appMap);
    });

    const events = dataStore.map((item, i) => ({
        start_date: { year: item.startdate || item.year || 2026 },
        text: { headline: item.title, text: item.description },
        media: { url: item.media || "" },
        unique_id: i
    }));

    appTimeline = new TL.Timeline('timeline-viewport', { events }, { height: 320 });
    appTimeline.on('change', (e) => {
        const active = dataStore[e.unique_id];
        if (active) {
            document.getElementById('view-title').innerText = active.title;
            document.getElementById('view-desc').innerHTML = active.description || "";
            document.getElementById('media-viewport').innerHTML = active.media ? `<img src="${active.media}" class="w-full h-full object-cover">` : "";
            if (active.lat && active.lon) appMap.flyTo([active.lat, active.lon], 11);
        }
    });
}

// Console Dragging Logic
const con = document.getElementById("vibe-console");
const head = document.getElementById("console-header");
let dragging = false, ox, oy;
head.onmousedown = (e) => { dragging = true; ox = e.clientX - con.offsetLeft; oy = e.clientY - con.offsetTop; };
document.onmousemove = (e) => { if (dragging) { con.style.left = (e.clientX - ox) + "px"; con.style.top = (e.clientY - oy) + "px"; } };
document.onmouseup = () => dragging = false;

document.addEventListener('DOMContentLoaded', initializeApp);
</script>
</body>
</html>
