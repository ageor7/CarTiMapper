<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern TimeMapper Core - v3.8.0</title>
    <style>
        :root { --bg: #121212; --pane: #1e1e1e; --border: #333; --text: #eee; --accent: #8be9fd; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; background: var(--bg); color: var(--text); }
        
        #app-grid { display: grid; grid-template-columns: 35% 65%; grid-template-rows: 45vh 45vh 10vh; height: 100vh; }
        .pane { border: 1px solid var(--border); padding: 1.5rem; box-sizing: border-box; overflow: hidden; }
        
        .map-pane { grid-column: 1; grid-row: 1; background: #1a1a24; display: flex; align-items: center; justify-content: center; }
        .media-pane { grid-column: 2; grid-row: 1; background: #151515; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; align-items: center; justify-content: center; }
        
        /* Smooth scrolling for the main content area */
        .content-pane { grid-column: 1 / span 2; grid-row: 2; background: var(--pane); overflow-y: auto; scroll-behavior: smooth; }
        .timeline-pane { grid-column: 1 / span 2; grid-row: 3; background: #0a0a0a; display: flex; align-items: center; justify-content: center; }

        /* The Content Cards */
        .slide-card { margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid #444; max-width: 900px; margin-left: auto; margin-right: auto; }
        .slide-date { color: var(--accent); font-weight: bold; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .slide-title { margin: 0.5rem 0 1rem 0; font-size: 2rem; }
        .slide-desc { line-height: 1.6; font-size: 1.1rem; color: #ccc; }
        .slide-meta { margin-top: 1rem; font-size: 0.85rem; color: #ffb86c; display: flex; gap: 1rem; }

        /* Vibe Monitor */
        #vibe-monitor {
            position: fixed; top: 15px; right: 15px; width: 500px; height: 400px;
            background: rgba(10, 10, 15, 0.95); border: 1px solid #444; border-radius: 8px;
            display: flex; flex-direction: column; z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.9); backdrop-filter: blur(8px);
            resize: both; overflow: hidden; font-family: 'Courier New', monospace;
        }
        #vibe-header { background: #222; padding: 8px; cursor: move; font-weight: bold; border-bottom: 1px solid #444; display: flex; justify-content: space-between; user-select: none; }
        #vibe-logs { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; line-height: 1.4; word-wrap: break-word; }
        
        .log-info { color: #8be9fd; }
        .log-success { color: #50fa7b; }
        .log-warn { color: #ffb86c; }
        .log-error { color: #ff5555; font-weight: bold; }
        .log-time { color: #6272a4; margin-right: 5px; }
        .log-pre { background: #111; padding: 8px; border-radius: 4px; color: #f8f8f2; overflow-x: auto; font-size: 11px; margin: 4px 0; border: 1px solid #333; }
    </style>
    
    <script type="importmap">
    {
        "imports": {
            "preact": "https://esm.sh/preact@10.19.3",
            "preact/hooks": "https://esm.sh/preact@10.19.3/hooks",
            "htm": "https://esm.sh/htm@3.1.1",
            "papaparse": "https://esm.sh/papaparse@5.4.1"
        }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { h, render } from 'preact';
        import { useState, useEffect, useRef } from 'preact/hooks';
        import htm from 'htm';
        import Papa from 'papaparse';

        const html = htm.bind(h);
        const APP_VERSION = 'v3.8.0';

        const useStore = () => {
            const [logs, setLogs] = useState([]);
            const [data, setData] = useState([]);
            const [status, setStatus] = useState('Idle');

            const addLog = (msg, type = 'info', rawData = null) => {
                const time = new Date().toLocaleTimeString('en-US', { hour12: false });
                setLogs(prev => [...prev, { time, msg, type, rawData }]);
            };

            return { logs, addLog, data, setData, status, setStatus };
        };

        const VibeMonitor = ({ logs, status }) => {
            const logEndRef = useRef(null);
            useEffect(() => { logEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [logs]);

            const onDrag = (e) => {
                const monitor = document.getElementById('vibe-monitor');
                let shiftX = e.clientX - monitor.getBoundingClientRect().left;
                let shiftY = e.clientY - monitor.getBoundingClientRect().top;
                const moveAt = (pageX, pageY) => {
                    monitor.style.left = pageX - shiftX + 'px';
                    monitor.style.top = pageY - shiftY + 'px';
                    monitor.style.right = 'auto';
                };
                const onMouseMove = (e) => moveAt(e.pageX, e.pageY);
                document.addEventListener('mousemove', onMouseMove);
                document.onmouseup = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            };

            return html`
                <div id="vibe-monitor">
                    <div id="vibe-header" onMouseDown=${onDrag}>
                        <span>🟢 Vibe-Monitor ${APP_VERSION}</span>
                        <span style="color: #bd93f9">[${status}]</span>
                    </div>
                    <div id="vibe-logs">
                        ${logs.map((l, i) => html`
                            <div key=${i} class="log-${l.type}">
                                <span class="log-time">[${l.time}]</span> ${l.msg}
                                ${l.rawData ? html`<pre class="log-pre">${JSON.stringify(l.rawData, null, 2)}</pre>` : ''}
                            </div>
                        `)}
                        <div ref=${logEndRef}></div>
                    </div>
                </div>
            `;
        };

        const App = () => {
            const { logs, addLog, data, setData, status, setStatus } = useStore();

            useEffect(() => {
                addLog(`Engine ${APP_VERSION} initialized. Content Renderer Active.`, 'info');
                const params = new URLSearchParams(window.location.search);
                let sourceParam = params.get('source');
                const gid = params.get('gid') || '0'; 

                if (!sourceParam) return setStatus('Awaiting Source');

                let fetchUrl = '';
                if (sourceParam.includes('http')) {
                    if (sourceParam.includes('/e/2PACX')) {
                        fetchUrl = sourceParam.split('/pub')[0] + '/pub?output=csv';
                    } else if (sourceParam.includes('/d/')) {
                        const match = sourceParam.match(/\/d\/([a-zA-Z0-9-_]+)/);
                        fetchUrl = `https://docs.google.com/spreadsheets/d/${match[1]}/gviz/tq?tqx=out:csv&gid=${gid}`;
                    } else {
                        fetchUrl = sourceParam; 
                    }
                } else {
                    if (sourceParam.startsWith('2PACX')) {
                        fetchUrl = `https://docs.google.com/spreadsheets/d/e/${sourceParam}/pub?output=csv&gid=${gid}`;
                    } else {
                        fetchUrl = `https://docs.google.com/spreadsheets/d/${sourceParam}/gviz/tq?tqx=out:csv&gid=${gid}`;
                    }
                }

                executeFetch(fetchUrl);
            }, []);

            const executeFetch = async (url) => {
                setStatus('Fetching Data');
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const csvText = await response.text();
                    
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: (results) => {
                            // Extract exact headers from the CSV
                            const headers = results.meta.fields || [];
                            addLog(`Found ${headers.length} Columns:`, 'info', headers);
                            
                            addLog(`Successfully parsed ${results.data.length} rows. Mapping dates...`, 'success');
                            validateAndCleanData(results.data);
                        },
                        error: (err) => {
                            addLog(`Parse Error: ${err.message}`, 'error');
                            setStatus('Parse Failed');
                        }
                    });
                } catch (error) {
                    addLog(`Fetch failed: ${error.message}`, 'error');
                    setStatus('Fetch Failed');
                }
            };

            const fuzzyFind = (row, possibleNames) => {
                const keys = Object.keys(row);
                for (let k of keys) {
                    const cleanKey = k.trim().toLowerCase();
                    if (possibleNames.includes(cleanKey)) return row[k] ? row[k].trim() : '';
                }
                return '';
            };

            /*
             * ------------------------------------------
             * THE CHRONO-ENGINE (Euro-Time Update)
             * ------------------------------------------
             */
            const parseTimelineDate = (rawStr) => {
                if (!rawStr) return null;
                let s = rawStr.toString().trim();

                // 1. Google Serial Date
                if (!isNaN(s) && s > 10000) return new Date((parseFloat(s) - 25569) * 86400 * 1000);

                // 2. Exact format: DD/MM/YYYY HH:mm (e.g. 25/12/2023 14:30)
                const euroTimeMatch = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})\s+(\d{1,2}):(\d{2})$/);
                if (euroTimeMatch) {
                    return new Date(
                        parseInt(euroTimeMatch[3]),       // Year
                        parseInt(euroTimeMatch[2]) - 1,   // Month (0-indexed)
                        parseInt(euroTimeMatch[1]),       // Day
                        parseInt(euroTimeMatch[4]),       // Hour
                        parseInt(euroTimeMatch[5])        // Minute
                    );
                }

                // 3. Just a Year or Negative Year
                if (/^-?\d{1,4}$/.test(s)) {
                    let d = new Date(0);
                    d.setFullYear(parseInt(s), 0, 1);
                    d.setHours(0,0,0,0);
                    return d;
                }

                // 4. Try Standard parsing
                let d = new Date(s);
                if (!isNaN(d.getTime())) return d;

                // 5. Try standard DD/MM/YYYY without time
                let parts = s.split(/[\/\-\.]/);
                if (parts.length === 3) {
                    let altDate = new Date(`${parts[1]}/${parts[0]}/${parts[2]}`);
                    if (!isNaN(altDate.getTime())) return altDate;
                }

                return null; 
            };

            const validateAndCleanData = (rawData) => {
                setStatus('Processing');
                
                const cleaned = rawData.map((row, index) => {
                    const startRaw = fuzzyFind(row, ['start', 'start date', 'startdate', 'date']);
                    const titleRaw = fuzzyFind(row, ['title', 'headline', 'name']);
                    const descRaw = fuzzyFind(row, ['description', 'text', 'content']);
                    const mediaRaw = fuzzyFind(row, ['media', 'image', 'photo', 'url']);
                    const locRaw = fuzzyFind(row, ['location', 'place', 'coordinates', 'map']);

                    return {
                        id: index,
                        title: titleRaw || `Event ${index + 1}`,
                        startDate: parseTimelineDate(startRaw),
                        rawStart: startRaw,
                        description: descRaw,
                        media: mediaRaw ? mediaRaw.split(',').map(s => s.trim()) : [],
                        location: locRaw || null
                    };
                });

                // Sort the data chronologically so the timeline makes sense
                const sortedData = cleaned.sort((a, b) => {
                    if (!a.startDate) return 1;
                    if (!b.startDate) return -1;
                    return a.startDate.getTime() - b.startDate.getTime();
                });

                setData(sortedData);
                
                // Log the first two parsed records to the monitor for inspection
                addLog(`Dumping First 2 Parsed Records for Inspection:`, 'success', sortedData.slice(0, 2));
                setStatus('Active');
            };

            // Formatting helper for the UI
            const formatDate = (dateObj) => {
                if (!dateObj) return 'Unknown Date';
                return dateObj.toLocaleDateString('en-US', { 
                    year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit' 
                }).replace(', 12:00 AM', ''); // Hide midnight if it's just a raw date
            };

            return html`
                ${html`<${VibeMonitor} logs=${logs} status=${status} />`}
                <div id="app-grid">
                    <div class="pane map-pane">
                        <div style="color:#555; text-align:center;">
                            <h3>Map Layer</h3>
                            <p>Awaiting Leaflet.js Injection</p>
                        </div>
                    </div>
                    
                    <div class="pane media-pane">
                        <div style="color:#555; text-align:center;">
                            <h3>Media Carousel</h3>
                            <p>Awaiting Media Handler</p>
                        </div>
                    </div>
                    
                    <div class="pane content-pane">
                        ${data.length === 0 ? html`<p>Loading content...</p>` : ''}
                        
                        ${data.map(item => html`
                            <div class="slide-card" id="slide-${item.id}">
                                <div class="slide-date">${formatDate(item.startDate)}</div>
                                <h2 class="slide-title" dangerouslySetInnerHTML=${{__html: item.title}}></h2>
                                <div class="slide-desc" dangerouslySetInnerHTML=${{__html: item.description}}></div>
                                
                                <div class="slide-meta">
                                    ${item.location ? html`<span>📍 ${item.location}</span>` : ''}
                                    ${item.media.length > 0 ? html`<span>📸 ${item.media.length} Media Item(s) Attached</span>` : ''}
                                </div>
                            </div>
                        `)}
                    </div>
                    
                    <div class="pane timeline-pane">
                        <div style="color:#555;">SVG Scrubber Bridge (Awaiting D3/SVG Canvas)</div>
                    </div>
                </div>
            `;
        };

        render(html`<${App} />`, document.getElementById('root'));
    </script>
</body>

                            <div key=${i} class="log-${l.type}">
                                <span class="log-time">[${l.time}]</span> ${l.msg}
                            </div>
                        `)}
                        <div ref=${logEndRef}></div>
                    </div>
                </div>
            `;
        };

            const { logs, addLog, data, setData, status, setStatus } = useStore();

            useEffect(() => {
                addLog(`Engine ${APP_VERSION} initialized. Loading Chrono-Engine...`, 'info');

                let sourceParam = params.get('source');
                const gid = params.get('gid') || '0'; 

                if (!sourceParam) return setStatus('Awaiting Source');

                let fetchUrl = '';
                if (sourceParam.includes('http')) {
                    if (sourceParam.includes('/e/2PACX')) {
                        fetchUrl = sourceParam.split('/pub')[0] + '/pub?output=csv';
                    } else if (sourceParam.includes('/d/')) {
                        const match = sourceParam.match(/\/d\/([a-zA-Z0-9-_]+)/);
                        fetchUrl = `https://docs.google.com/spreadsheets/d/${match[1]}/gviz/tq?tqx=out:csv&gid=${gid}`;
                    } else {
                        fetchUrl = sourceParam; 
                    }
                } else {
                    if (sourceParam.startsWith('2PACX')) {
                        fetchUrl = `https://docs.google.com/spreadsheets/d/e/${sourceParam}/pub?output=csv&gid=${gid}`;
                    } else {
                        fetchUrl = `https://docs.google.com/spreadsheets/d/${sourceParam}/gviz/tq?tqx=out:csv&gid=${gid}`;

                }

                return null; // I yield, it's unparseable.
            };

                let validCount = 0;
                let missingDates = 0;
                let blankDates = 0;
                let failedExamples = []; // Keep a log of exactly what failed

                    const startRaw = fuzzyFind(row, ['start', 'start date', 'startdate', 'date']);

                        parsedDate = parseTimelineDate(startRaw);
                        if (!parsedDate || isNaN(parsedDate)) {
                            missingDates++;
                            // Grab up to 3 failing strings for the diagnostic monitor
                            if (failedExamples.length < 3) {

                            }

                            validCount++;
                        }

                    }

                    };

                        addLog(`CHRONO-ERROR SAMPLES: ${failedExamples.join(' | ')}`, 'error');

                    }
                } else {
                    addLog(`Data strategy complete. 100% Date Integrity.`, 'success');
                }
                setStatus('Active');
            };

                ${html`<${VibeMonitor} logs=${logs} status=${status} />`}

                        <div style="color:#555">Map Canvas (Ready for Leaflet)</div>

                        <div style="color:#555">Media Carousel</div>
                    </div>
                    <div class="pane content-pane">
                        <h2>Content Layer v3.7</h2>
                        <p>Currently tracking ${data.length} verified records in state.</p>
                        ${data.length > 0 ? html`
                            <pre style="font-size:11px; color:#aaa; background:#111; padding: 10px; border-radius: 4px; overflow-x: auto;">
                                ${JSON.stringify(data[0], null, 2)}
                            </pre>
                        ` : ''}
                    </div>
                    <div class="pane timeline-pane">
                        <div style="color:#555">SVG Scrubber Bridge</div>
                    </div>
                </div>
            `;
        };

        render(html`<${App} />`, document.getElementById('root'));
    </script>
</body>
</html>
