<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern TimeMapper Core - v3.15.0</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        :root { --bg: #121212; --paneBg: #fcfcfc; --border: #ccc; --text: #222; --accent: #007acc; }
        
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; background: var(--bg); color: var(--text); }
        
        #app-layout { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        .top-row { 
            display: flex; height: 45vh; min-height: 15vh; max-height: 80vh;
            flex-shrink: 0; resize: vertical; overflow: hidden; 
            border-bottom: 2px solid #aaa; background: #fff; position: relative;
        }
        
        .pane { padding: 1rem; box-sizing: border-box; background: var(--paneBg); position: relative; }
        
        .map-pane { 
            width: 35%; min-width: 15%; max-width: 80%; resize: horizontal; 
            overflow: hidden; border-right: 2px solid #aaa; padding: 0;
            position: relative;
        }
        /* Leaflet Container */
        #map-container { width: 100%; height: 100%; background: #e0e0e0; z-index: 1; }
        
        .media-pane { flex: 1; overflow-x: auto; scroll-snap-type: x mandatory; display: flex; align-items: center; justify-content: center; }
        
        .content-pane { flex: 1; overflow-y: auto; display: flex; flex-direction: column; position: relative; border-bottom: 1px solid var(--border); }
        
        /* Timeline UI - Expanded width for auto-focus zooming */
        .timeline-pane { height: 12vh; min-height: 60px; flex-shrink: 0; padding: 0; background: #e5e5e5; display: flex; flex-direction: column; position: relative;}
        .timeline-scroll-wrapper { width: 100%; height: 100%; overflow-x: auto; overflow-y: hidden; position: relative; display: flex; align-items: center; scroll-behavior: smooth; }
        
        .timeline-axis { position: absolute; bottom: 15px; left: 2%; right: 2%; height: 2px; background: #888; min-width: 2000px; /* Force wide track to prevent crowding */ }
        
        .timeline-ruler-tick { position: absolute; bottom: 15px; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .tick-mark { width: 2px; height: 10px; background: #888; margin-bottom: 2px; }
        .tick-label { font-size: 0.7rem; color: #555; font-weight: bold; }

        .timeline-marker { 
            position: absolute; bottom: 25px; transform: translateX(-50%); 
            width: 12px; height: 12px; border-radius: 50%; background: #666; border: 2px solid #fff; 
            cursor: pointer; transition: all 0.2s ease; z-index: 10;
        }
        .timeline-marker-stem { position: absolute; bottom: -10px; left: 5px; width: 2px; height: 10px; background: #666; }
        .timeline-marker:hover { transform: translateX(-50%) scale(1.3); background: #333; z-index: 15; }
        .timeline-marker.active { background: var(--accent); z-index: 20; box-shadow: 0 0 0 3px rgba(0, 122, 204, 0.3); }
        .timeline-marker.active .timeline-marker-stem { background: var(--accent); }
        
        .timeline-label {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            font-size: 0.8rem; color: #222; white-space: nowrap; opacity: 0; font-weight: normal;
            background: rgba(255, 255, 255, 0.95); padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc;
            pointer-events: none; transition: opacity 0.2s; max-width: 250px; overflow: hidden; text-overflow: ellipsis;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .timeline-marker:hover .timeline-label, .timeline-marker.active .timeline-label { opacity: 1; }

        /* Slide Typography */
        .slide-container { width: 100%; margin: 0 auto; padding: 1rem 3rem; flex: 1; box-sizing: border-box; }
        .slide-date { color: var(--accent); font-weight: bold; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; }
        .slide-title { margin: 0.5rem 0 1rem 0; font-size: 2.2rem; color: #111; font-weight: normal; }
        .slide-desc { line-height: 1.6; font-size: 1.1rem; color: #333; width: 100%; }
        .slide-meta { margin-top: 2rem; font-size: 0.9rem; color: #666; display: flex; gap: 1rem; border-top: 1px solid #ddd; padding-top: 1rem; }

        /* Controls */
        .nav-btn-side {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.05); color: #333; border: none;
            width: 30px; height: 80px; font-size: 1.2rem; cursor: pointer;
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; z-index: 50;
        }
        .nav-btn-side:hover { background: rgba(0, 0, 0, 0.15); }
        .nav-btn-side:disabled { opacity: 0.1; cursor: not-allowed; }
        .nav-left { left: 5px; }
        .nav-right { right: 5px; }
        .slide-counter { position: absolute; bottom: 8px; right: 12px; font-size: 0.75rem; color: #888; font-weight: bold; user-select: none; }

        /* About Toggle Button & Modal */
        #about-toggle {
            position: absolute; top: 15px; right: 15px; z-index: 9000;
            background: #222; color: #fff; border: 1px solid #555; border-radius: 20px;
            padding: 6px 12px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        #about-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 800px; max-height: 80vh; overflow-y: auto;
            background: #fff; z-index: 9999; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            padding: 2rem; display: none; border: 1px solid #ccc; color: #222;
        }
        #about-modal.open { display: block; }
        .about-close { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer; }

        /* Vibe Monitor */
        #vibe-monitor {
            position: fixed; width: 450px; height: 400px;
            background: rgba(10, 10, 15, 0.95); border: 1px solid #444; border-radius: 8px;
            display: flex; flex-direction: column; z-index: 9999; color: #eee;
            box-shadow: 0 8px 32px rgba(0,0,0,0.9); backdrop-filter: blur(8px);
            resize: both; overflow: hidden; font-family: 'Courier New', monospace;
        }
        #vibe-header { background: #222; padding: 8px; cursor: move; font-weight: bold; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .vibe-close-btn { background: #ff5555; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; padding: 2px 6px; }
        
        .vibe-active-tracker { background: #1a1a24; padding: 8px; border-bottom: 1px solid #444; font-size: 0.75rem; color: #f1fa8c; overflow-y: auto; max-height: 100px; border-top: 1px solid #333;}
        
        #vibe-logs { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; line-height: 1.4; word-wrap: break-word; }
        .log-info { color: #8be9fd; }
        .log-success { color: #50fa7b; }
        .log-warn { color: #ffb86c; }
        .log-error { color: #ff5555; font-weight: bold; }
        .log-time { color: #6272a4; margin-right: 5px; }
