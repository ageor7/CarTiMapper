                                            if (diff < minDiff) { minDiff = diff; initialIdx = i; }
                                        }
                                    });
                                }
                            }
                            setActiveIndex(initialIdx); 
                            
                            setStatus({ text: `Success! Loaded ${cleaned.length} records.`, progress: 100, isFading: true, active: false });
                            setTimeout(() => {
                                setStatus({ text: '', progress: 100, isFading: true, active: true });
                            }, 500);
                            
                        },
                        error: (err) => { addLog(`Parse Error: ${err.message}`, 'error'); setStatus({ text: `Parse Failed: ${err.message}`, progress: 0, isFading: false, active: false }); }
                    });
                }).catch(err => { addLog(`Fetch failed: ${err.message}`, 'error'); setStatus({ text: `Connection Failed: ${err.message}`, progress: 0, isFading: false, active: false }); });
            }, []);

            const activeSlide = data[activeIndex];
            const hasMedia = activeSlide?.media?.length > 0;

            return html`
                <div id="tm-root">
                    ${!status.active ? html`
                        <div class="loading-screen ${status.isFading ? 'fade-out' : ''}">
                            <div class="loading-title">CarTiMapper</div>
                            <div class="loading-status">${status.text}</div>
                            <div class="loading-bar-container">
                                <div class="loading-bar-fill" style="width: ${status.progress}%;"></div>
                            </div>
                        </div>
                    ` : ''}

                    ${data.length > 0 ? html`
                        ${aboutData ? html`
                            <div id="about-modal" class=${isAboutOpen ? 'open' : ''}>
                                <button class="about-close" onClick=${() => setIsAboutOpen(false)}>×</button>
                                <h2 dangerouslySetInnerHTML=${{__html: aboutData.title}}></h2>
                                <div style="line-height: 1.6; margin-bottom: 2rem;" dangerouslySetInnerHTML=${{__html: aboutData.description}}></div>
                                
                                <div class="about-meta-footer">
                                    <div style="margin-bottom: 6px;"><b style="color: #333;">Engine:</b> CarTiMapper Core ${APP_VERSION}</div>
                                    <div style="margin-bottom: 15px;"><b style="color: #333;">Source:</b> <a href="${aboutData.rawSource && aboutData.rawSource.startsWith('http') ? aboutData.rawSource : `https://docs.google.com/spreadsheets/d/${aboutData.rawSource}`}" target="_blank" style="word-break: break-all;">${aboutData.rawSource || 'Local/Unknown Data'}</a></div>
                                    
                                    <div style="background: #f0f0f0; padding: 12px; border-radius: 6px; border: 1px solid #ddd; font-family: monospace;">
                                        <b style="color: #333; display: block; margin-bottom: 8px; font-family: 'Noto Sans', sans-serif;">URL Routing Parameters:</b>
                                        <div style="font-size: 0.85rem; color: #666; margin-bottom: 8px; font-family: 'Noto Sans', sans-serif;">Combine variables using <b>&</b> (e.g., <code style="color: #007acc; font-weight:bold;">?source=XYZ&slide=2</code>)</div>
                                        <div style="margin-bottom: 6px;"><span style="color: #d32f2f; font-weight: bold;">?source=URL</span> <span style="font-size: 0.85rem; color: #555;">Load specific Google Sheet (Required)</span></div>
                                        <div style="margin-bottom: 6px;"><span style="color: #d32f2f; font-weight: bold;">?slide=5</span> <span style="font-size: 0.85rem; color: #555;">Jump directly to slide index</span></div>
                                        <div style="margin-bottom: 6px;"><span style="color: #d32f2f; font-weight: bold;">?date=1945-05-08</span> <span style="font-size: 0.85rem; color: #555;">Jump to closest timeline event</span></div>
                                        <div style="margin-bottom: 6px;"><span style="color: #d32f2f; font-weight: bold;">?mapzoom=8</span> <span style="font-size: 0.85rem; color: #555;">Force initial camera zoom level</span></div>
                                        <div><span style="color: #d32f2f; font-weight: bold;">?theme=dark</span> <span style="font-size: 0.85rem; color: #555;">Enable experimental dark mode</span></div>
                                    </div>
                                </div>
                            </div>
                        ` : ''}

                        <div id="app-layout" ref=${appRef}>
                            <div class="top-row">
                                <div class="map-pane ${!hasMedia ? 'no-media' : ''}">
                                    <${MapViewer} data=${data} activeIndex=${activeIndex} setActiveIndex=${setActiveIndex} addLog=${addLog} />
                                    <${VibeMonitor} logs=${logs} status=${status.text} isOpen=${isMonitorOpen} setIsOpen=${setIsMonitorOpen} />
