        import { h, render, Component } from 'https://esm.sh/preact';
        import { useState, useEffect, useLayoutEffect, useRef } from 'https://esm.sh/preact/hooks';

        const stripHTML = (htmlStr) => {
            if (!htmlStr) return '';
            const tmp = document.createElement("DIV");
            tmp.innerHTML = htmlStr;
            return tmp.textContent || tmp.innerText || "";
        };
        // === [ END MAJOR BLOCK: Utilities v1.0.0 ] ===

        // === [ MAJOR BLOCK: ErrorBoundary v1.0.0 ] ===
        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) return html`<div style="padding:20px; color:red; font-family:monospace;"><h3>CarTiMapper Crash</h3><p>${this.state.error.toString()}</p></div>`;
                return this.props.children;
            }
        }
        // === [ END MAJOR BLOCK: ErrorBoundary v1.0.0 ] ===

        // === [ MAJOR BLOCK: VibeMonitor v2.0.0 ] ===
        // [FIX: DIAG-01] Added Active Sensor Telemetry block
        const VibeMonitor = ({ logs, status, isOpen, setIsOpen, activeSlide, appVersion, moduleVersions }) => {
            const logsEndRef = useRef(null);
            const monitorRef = useRef(null);
            const [isDragging, setIsDragging] = useState(false);
            const [pos, setPos] = useState({ x: 10, y: 50 }); 
            const dragStart = useRef({ x: 0, y: 0 });

            useEffect(() => { if (logsEndRef.current && isOpen) logsEndRef.current.scrollIntoView({ behavior: "smooth" }); }, [logs, isOpen]);

            const onMouseDown = (e) => {
                if (e.target.closest('.vibe-close-btn')) return;
                setIsDragging(true);
                dragStart.current = { x: e.clientX - pos.x, y: e.clientY - pos.y };
            };
            const onMouseMove = (e) => {
                if (!isDragging) return;
                let newX = e.clientX - dragStart.current.x; let newY = e.clientY - dragStart.current.y;
                setPos({ x: newX, y: newY });
            };
            const onMouseUp = () => setIsDragging(false);

            useEffect(() => {
                if (isDragging) { document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp); }
                else { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); }
                return () => { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); };
            }, [isDragging]);

            if (!isOpen) return null;
            return html`
                <div id="vibe-monitor" ref=${monitorRef} style="left: ${pos.x}px; bottom: ${pos.y}px;">
                    <div id="vibe-header" onMouseDown=${onMouseDown}>
                        <span>SYS MON | ${appVersion}</span>
                        <button class="vibe-close-btn" onClick=${() => setIsOpen(false)}>Close</button>
                    </div>
                    <div style="background: #111; padding: 6px 10px; border-bottom: 1px solid #333; font-size: 11px; color: #aaa;">
                        <div style="margin-bottom: 4px;">MODULES: Env:${moduleVersions.Globals} | UI:${moduleVersions.Styles}</div>
                        <div style="color: #8be9fd;">ACTIVE LOC: ${activeSlide ? (activeSlide.location || 'NULL') : 'N/A'}</div>
                    </div>
                    <div id="vibe-logs">
                        ${logs.map((log, i) => html`<div key=${i} class="log-${log.type}"><span class="log-time">[${log.time}]</span> ${log.msg}</div>`)}
                        <div ref=${logsEndRef} />
                    </div>
                </div>
            `;
        };
        // === [ END MAJOR BLOCK: VibeMonitor v2.0.0 ] ===

        // === [ MAJOR BLOCK: MapViewer v3.19.0 ] ===
        const MapViewer = ({ data, activeIndex, setActiveIndex, addLog, mapBasemap, maxAutoZoom, minimapOffset }) => {
            const mapDomRef = useRef(null);
            const miniMapDomRef = useRef(null);
            
            const mapInstance = useRef(null);
            const miniMapInstance = useRef(null);
            const rectBoundsRef = useRef(null);
            
            const markerLayer = useRef(null); 
            const clusterLayer = useRef(null); 
            const tileLayerRef = useRef(null);
            const miniMapTileLayerRef = useRef(null);
            const gridLayerRef = useRef(null);
            const markersRef = useRef({}); 
            
            const hasFitBounds = useRef(false);
            const [mapZoom, setMapZoom] = useState(2);
            const [showGrid, setShowGrid] = useState(false);

            const minimapOffsetRef = useRef(minimapOffset || -4);

            // [FIX: MAP-11] The Basemap Core Registry
            const BASEMAPS = {
                'carto-light': { url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', opts: { maxZoom: 19, attribution: '© OpenStreetMap, © CartoDB' } },
                'esri-street': { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', opts: { maxZoom: 19, attribution: 'Tiles © Esri' } },
                'esri-sat': { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', opts: { maxZoom: 19, attribution: 'Tiles © Esri' } },
                'osm': { url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', opts: { maxZoom: 19, attribution: '© OpenStreetMap' } },
                'topo': { url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', opts: { maxZoom: 17, attribution: '© OpenTopoMap, OSM' } }
            };

            useEffect(() => {
                minimapOffsetRef.current = minimapOffset;
                if (mapInstance.current && miniMapInstance.current) {
                    let targetMiniZoom = mapInstance.current.getZoom() + minimapOffset;
                    if (targetMiniZoom < 0) targetMiniZoom = 0;
                    miniMapInstance.current.setView(mapInstance.current.getCenter(), targetMiniZoom, { animate: true });
                }
            }, [minimapOffset]);

            const createPinHtml = (isActive, isVip) => {
                const color = isActive ? '#28a745' : (isVip ? '#ffb300' : '#007acc');
                const scale = isActive ? 'scale(1.3)' : 'scale(1)';
                const z = isActive ? '1000' : '0';
                return `<div class="custom-map-pin" style="transform: ${scale}; z-index: ${z};">
                            <div class="pin-head" style="background: ${color};"></div>
                            <div class="pin-stem" style="background: ${isActive ? '#28a745' : '#333'}; width: ${isActive ? '3px' : '2px'};"></div>
                        </div>`;
            };

            const extractLayers = (layerObj) => {
                let layers = [];
                if (Array.isArray(layerObj)) layerObj.forEach(l => layers = layers.concat(extractLayers(l)));
                else if (layerObj && layerObj.eachLayer) layerObj.eachLayer(l => layers = layers.concat(extractLayers(l)));
                else if (layerObj) layers.push(layerObj);
                return layers;
            };

            const parseGeometryCollection = (wktStr) => {
                const cleanStr = wktStr.trim().replace(/^GEOMETRYCOLLECTION\s*\(/i, '').replace(/\)\s*$/, '');
                let inParen = 0;
                let currentGeom = '';
                const geometries = [];
                
                for (let i = 0; i < cleanStr.length; i++) {
                    const char = cleanStr[i];
                    if (char === '(') inParen++;
                    if (char === ')') inParen--;
                    
                    if (char === ',' && inParen === 0) {
                        geometries.push(currentGeom.trim());
                        currentGeom = '';
                    } else {
                        currentGeom += char;
                    }
                }
                if (currentGeom.trim()) geometries.push(currentGeom.trim());
                
                let extractedLayers = [];
                geometries.forEach(geomStr => {
                    try {
                        const wkt = new window.Wkt.Wkt();
                        wkt.read(geomStr);
                        extractedLayers = extractedLayers.concat(extractLayers(wkt.toObject()));
                    } catch (e) {
                        const upper = geomStr.toUpperCase();
                        if (upper.startsWith('POINT')) {
                            const m = geomStr.match(/(-?\d+\.?\d*)\s+(-?\d+\.?\d*)/);
                            if (m) extractedLayers.push(L.marker([parseFloat(m[2]), parseFloat(m[1])])); 
                        } else if (upper.startsWith('LINESTRING')) {
                            const m = [...geomStr.matchAll(/(-?\d+\.?\d*)\s+(-?\d+\.?\d*)/g)];
                            if (m.length > 0) extractedLayers.push(L.polyline(m.map(x => [parseFloat(x[2]), parseFloat(x[1])])));
                        } else if (upper.startsWith('POLYGON')) {
                            const m = [...geomStr.matchAll(/(-?\d+\.?\d*)\s+(-?\d+\.?\d*)/g)];
                            if (m.length > 0) extractedLayers.push(L.polygon(m.map(x => [parseFloat(x[2]), parseFloat(x[1])])));
                        }
                    }
                });
                return extractedLayers;
            };

            useEffect(() => {
                if (mapDomRef.current && miniMapDomRef.current && !mapInstance.current && window.L) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const initialZoom = urlParams.get('mapzoom') ? parseInt(urlParams.get('mapzoom')) : 2;
                    setMapZoom(initialZoom);
                    
                    const map = L.map(mapDomRef.current, { zoomControl: false }).setView([20, 0], initialZoom);
                    L.control.zoom({ position: 'topright' }).addTo(map);
                    L.control.scale({ position: 'bottomleft', imperial: true, metric: true }).addTo(map);
                    
                    map.on('zoomend', () => setMapZoom(map.getZoom()));

                    const baseConfig = BASEMAPS[mapBasemap] || BASEMAPS['carto-light'];
                    tileLayerRef.current = L.tileLayer(baseConfig.url, baseConfig.opts).addTo(map);
                    
                    markerLayer.current = L.featureGroup().addTo(map);
                    clusterLayer.current = L.markerClusterGroup({ maxClusterRadius: 40, spiderfyOnMaxZoom: true }).addTo(map);
                    gridLayerRef.current = L.layerGroup().addTo(map);
                    
                    clusterLayer.current.on('clustermouseover', (c) => {
                        const children = c.layer.getAllChildMarkers();
                        const titles = [...new Set(children.map(m => m.getTooltip().getContent()))];
                        let displayHtml = titles.slice(0, 5).join('<br/>');
                        if (titles.length > 5) displayHtml += `<br/><em style="color: #666; font-size: 0.8em;">+${titles.length - 5} more locations...</em>`;
                        c.layer.bindTooltip(displayHtml, { direction: 'top', className: 'centered-tooltip' }).openTooltip();
                    });
                    clusterLayer.current.on('clustermouseout', (c) => c.layer.unbindTooltip());

                    const miniMap = L.map(miniMapDomRef.current, { zoomControl: false, attributionControl: false, dragging: false, touchZoom: false, scrollWheelZoom: false, doubleClickZoom: false }).setView([20, 0], 0);
                    miniMapTileLayerRef.current = L.tileLayer(baseConfig.url, baseConfig.opts).addTo(miniMap);
                    
                    const boundsRect = L.rectangle(map.getBounds(), { color: '#007acc', weight: 2, fillOpacity: 0.15 }).addTo(miniMap);
                    rectBoundsRef.current = boundsRect;

                    map.on('move', () => { 
                        let targetMiniZoom = map.getZoom() + minimapOffsetRef.current;
                        if (targetMiniZoom < 0) targetMiniZoom = 0; 
                        
                        miniMap.setView(map.getCenter(), targetMiniZoom, { animate: false });

                        const mapBounds = map.getBounds();
                        const center = map.getCenter();
                        const nw = miniMap.project(mapBounds.getNorthWest(), targetMiniZoom);
                        const se = miniMap.project(mapBounds.getSouthEast(), targetMiniZoom);
                        
                        const w = Math.abs(se.x - nw.x);
                        const h = Math.abs(se.y - nw.y);
                        const MIN_PX = 30; 
                        
                        if (w < MIN_PX || h < MIN_PX) {
                            const cPx = miniMap.project(center, targetMiniZoom);
                            const adjW = Math.max(w, MIN_PX);
                            const adjH = Math.max(h, MIN_PX);
                            
                            const newNw = L.point(cPx.x - adjW / 2, cPx.y - adjH / 2);
                            const newSe = L.point(cPx.x + adjW / 2, cPx.y + adjH / 2);
                            
                            boundsRect.setBounds(L.latLngBounds(
                                miniMap.unproject(newNw, targetMiniZoom),
                                miniMap.unproject(newSe, targetMiniZoom)
                            ));
                        } else {
                            boundsRect.setBounds(mapBounds);
                        }
                    });

                    mapInstance.current = map;
                    miniMapInstance.current = miniMap;
                    
                    if (window.ResizeObserver) {
                        const ro = new ResizeObserver(() => { setTimeout(() => { if (mapInstance.current) mapInstance.current.invalidateSize(); if (miniMapInstance.current) miniMapInstance.current.invalidateSize(); }, 50); });
                        ro.observe(mapDomRef.current.parentElement);
                    }
                }
            }, []);

            useEffect(() => {
                const map = mapInstance.current;
                if (!map || !gridLayerRef.current) return;
                
                const updateGrid = () => {
                    gridLayerRef.current.clearLayers();
                    if (!showGrid) return;

                    const z = map.getZoom();
                    let step = 20;
                    if (z > 3) step = 10;
                    if (z > 5) step = 5;
                    if (z > 7) step = 1;
                    if (z > 9) step = 0.5;
                    if (z > 11) step = 0.1;
                    if (z > 13) step = 0.05;
                    if (z > 15) step = 0.01;

                    const b = map.getBounds();
                    const w = Math.floor(b.getWest() / step) * step - step;
                    const e = Math.ceil(b.getEast() / step) * step + step;
                    const s = Math.floor(b.getSouth() / step) * step - step;
                    const n = Math.ceil(b.getNorth() / step) * step + step;

                    const style = { color: '#007acc', weight: 1, opacity: 0.25, dashArray: '2, 6', interactive: false };

                    for (let lat = s; lat <= n; lat += step) {
                        if (lat >= -90 && lat <= 90) L.polyline([[lat, w], [lat, e]], style).addTo(gridLayerRef.current);
                    }
                    for (let lng = w; lng <= e; lng += step) {
                        L.polyline([[-90, lng], [90, lng]], style).addTo(gridLayerRef.current);
                    }
                };

                updateGrid();
                map.on('moveend', updateGrid);
                return () => map.off('moveend', updateGrid);
            }, [showGrid]);

            // [FIX: MAP-11] The Real-Time Tile Un-mounting Loop
            useEffect(() => {
                const map = mapInstance.current;
                const miniMap = miniMapInstance.current;
                if (!map || !miniMap) return;

                const config = BASEMAPS[mapBasemap] || BASEMAPS['carto-light'];
                
                if (tileLayerRef.current) map.removeLayer(tileLayerRef.current);
                tileLayerRef.current = L.tileLayer(config.url, config.opts).addTo(map);
                
                if (miniMapTileLayerRef.current) miniMap.removeLayer(miniMapTileLayerRef.current);
                miniMapTileLayerRef.current = L.tileLayer(config.url, config.opts).addTo(miniMap);
                
            }, [mapBasemap]);

            useEffect(() => {
                const map = mapInstance.current;
                const miniMap = miniMapInstance.current;
                if (!map || data.length === 0) return;
                
                markerLayer.current.clearLayers();
                clusterLayer.current.clearLayers();
                markersRef.current = {};
                let validMarkers = 0;

                data.forEach((item, idx) => {
                    const locStr = String(item.location || '').trim();
                    if (!locStr) return;
                    const activeLayersArray = []; 
                    let featureLayers = [];

                    try {
                        if (locStr.match(/^GEOMETRYCOLLECTION/i)) {
                            featureLayers = parseGeometryCollection(locStr);
                        } else if (locStr.match(/^[A-Z]+\s*\(/)) {
                            const wkt = new window.Wkt.Wkt(); wkt.read(locStr);
                            featureLayers = extractLayers(wkt.toObject());
                        } else if (locStr.startsWith('{') && locStr.includes('"type"')) {
                            featureLayers = extractLayers(L.geoJSON(JSON.parse(locStr)));
                        } else {
                            const coordMatch = locStr.match(/(-?\d+(?:\.\d+)?)[,\s]+(-?\d+(?:\.\d+)?)/);
                            if (coordMatch) featureLayers.push(L.marker([parseFloat(coordMatch[1]), parseFloat(coordMatch[2])]));
                        }

                        const subLabels = item.subLabels ? item.subLabels.split(/[|\-·;\n]/).map(s => s.split(',')[0].trim()) : [];
                        const isVip = String(item.priority).trim().toUpperCase() === 'VIP';

                        featureLayers.forEach((layer, layerIdx) => {
                            if (layer instanceof L.Polygon) {
                                layer.setStyle({ stroke: false, fillColor: '#007acc', fillOpacity: 0.4 });
                            } else if (layer instanceof L.Polyline) {
                                layer.setStyle({ color: '#007acc', weight: 2, dashArray: '5, 5' });
                            } else if (layer.setStyle) {
                                layer.setStyle({ color: '#007acc', weight: 4 });
                            }

                            if (layer instanceof L.Marker) {
                                layer.setIcon(L.divIcon({ className: 'custom-div-icon', html: createPinHtml(false, isVip), iconSize: [24, 34], iconAnchor: [12, 34] }));
                                layer.isVip = isVip;
                            } 
                            
                            let labelText = subLabels[layerIdx] ? subLabels[layerIdx] : (item.place ? stripHTML(item.place) : stripHTML(item.title));
                            layer.bindTooltip(labelText, { direction: 'top', offset: [0, -48], className: 'centered-tooltip' });
                            layer.on('click', () => setActiveIndex(idx));

                            if (layer instanceof L.Marker && !isVip) clusterLayer.current.addLayer(layer); 
                            else markerLayer.current.addLayer(layer); 

                            activeLayersArray.push(layer);
                            validMarkers++;
                        });

                        if (activeLayersArray.length > 0) markersRef.current[idx] = activeLayersArray; 
                    } catch(e) { console.error("Map Error Row", idx, e); }
                });

                setTimeout(() => {
                    if (map && validMarkers > 0 && !hasFitBounds.current && !new URLSearchParams(window.location.search).get('mapzoom')) {
                        const bounds = L.latLngBounds();
                        markerLayer.current.eachLayer(l => { if (l.getLatLng) bounds.extend(l.getLatLng()); else if (l.getBounds) bounds.extend(l.getBounds()); });
                        clusterLayer.current.eachLayer(l => bounds.extend(l.getLatLng()));
                        if (bounds.isValid()) {
                            map.fitBounds(bounds, { padding: [30, 30], maxZoom: 6 });
                            hasFitBounds.current = true;
                        }
                    }
                }, 150);
            }, [data]);

            useEffect(() => {
                const map = mapInstance.current;
                const markers = markersRef.current;
                if (!map || Object.keys(markers).length === 0) return;

                Object.keys(markers).forEach(idxStr => {
                    const isTarget = parseInt(idxStr, 10) === activeIndex;
                    markers[idxStr].forEach(l => {
                        if (l instanceof L.Polygon) {
                            l.setStyle({ stroke: false, fillColor: isTarget ? '#28a745' : '#007acc', fillOpacity: isTarget ? 0.6 : 0.4 });
                            if (isTarget && l.bringToFront) l.bringToFront();
                        } else if (l instanceof L.Polyline) {
                            l.setStyle({ color: isTarget ? '#28a745' : '#007acc', weight: isTarget ? 3 : 2, dashArray: '5, 5' });
                            if (isTarget && l.bringToFront) l.bringToFront();
                        } else if (l instanceof L.Marker) {
                            if (isTarget) {
                                l.setIcon(L.divIcon({ className: 'custom-div-icon', html: createPinHtml(true, l.isVip), iconSize: [24, 34], iconAnchor: [12, 34] }));
                                if (!l.isVip) { clusterLayer.current.removeLayer(l); markerLayer.current.addLayer(l); }
                                l.setZIndexOffset(1000);
                            } else {
                                l.setIcon(L.divIcon({ className: 'custom-div-icon', html: createPinHtml(false, l.isVip), iconSize: [24, 34], iconAnchor: [12, 34] }));
                                if (!l.isVip) { markerLayer.current.removeLayer(l); clusterLayer.current.addLayer(l); }
                                l.setZIndexOffset(0);
                            }
                        } else if (l.setStyle) {
                            l.setStyle({ color: isTarget ? '#28a745' : '#007acc', weight: isTarget ? 5 : 4 });
                            if (isTarget && l.bringToFront) l.bringToFront();
                        }
                    });
                });

                const activeLayers = markers[activeIndex];
                if (activeLayers && activeLayers.length > 0) {
                    const activeFeatureGroup = L.featureGroup(activeLayers);
                    setTimeout(() => {
                        try {
                            const bounds = activeFeatureGroup.getBounds();
                            if (bounds.isValid()) map.flyToBounds(bounds, { animate: true, duration: 2.5, maxZoom: maxAutoZoom });
                            activeLayers.forEach(l => { if (l.openTooltip) l.openTooltip(); });
                        } catch(err) {}
                    }, 100);
                }
            }, [activeIndex, data, maxAutoZoom]);

            return html`
                <div style="position: relative; width:100%; height:100%;">
                    <div ref=${mapDomRef} style="width:100%; height:100%; z-index:1; position: absolute; top:0; left:0; right:0; bottom:0;"></div>
                    <div style="position: absolute; bottom: 15px; right: 15px; z-index: 1000; display: flex; gap: 8px; align-items: center;">
                        <button onClick=${() => setShowGrid(!showGrid)} style="background: ${showGrid ? '#007acc' : '#fcfcfc'}; color: ${showGrid ? '#fff' : '#333'}; border: 1px solid #ccc; padding: 4px 10px; border-radius: 4px; font-size: 0.85rem; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.2); transition: all 0.2s;">Grid</button>
                        <div style="background: rgba(255,255,255,0.9); padding: 4px 10px; border-radius: 4px; font-size: 0.85rem; color: #333; border: 1px solid #ccc; box-shadow: 0 1px 4px rgba(0,0,0,0.2);">Zoom: ${mapZoom}</div>
                    </div>
                    <div class="minimap-container" ref=${miniMapDomRef}></div>
                </div>
            `;
        };
        MODULE_VERSIONS['MapViewer'] = 'v3.19.0';
        // === [ END MAJOR BLOCK: MapViewer v3.19.0 ] ===

        // === [ MAJOR BLOCK: MediaViewer v2.9.0 ] ===
        const MediaViewer = ({ activeSlide, addLog }) => {
            const carouselRef = useRef(null);
            // Used to prevent clicks firing if the user is swiping natively
            const isSwiping = useRef(false);
            const touchStartX = useRef(0);

            useEffect(() => {
                if (carouselRef.current) {
                    carouselRef.current.scrollTo({ left: 0, behavior: 'smooth' });
                }
            }, [activeSlide]);

            if (!activeSlide || !activeSlide.media || activeSlide.media.length === 0) return null;
            
            const splitRegex = /[\r\n]+|\\n/;
            
            let mediaItems = [];
            let captions = [];
            let credits = [];

            const rawMediaData = activeSlide.media;
            const rawCaptionData = activeSlide.mediaCaption;
            const rawCreditData = activeSlide.mediaCredit;

            const rawMedia = Array.isArray(rawMediaData) ? rawMediaData : [rawMediaData || ''];
            rawMedia.forEach(m => {
                if (typeof m === 'string') mediaItems.push(...m.split(splitRegex));
                else mediaItems.push(m);
            });
            mediaItems = mediaItems.map(s => String(s).trim()).filter(Boolean);

            const rawCaps = Array.isArray(rawCaptionData) ? rawCaptionData : [rawCaptionData || ''];
            rawCaps.forEach(c => {
                if (typeof c === 'string') captions.push(...c.split(splitRegex));
                else captions.push(c);
            });
            captions = captions.map(s => String(s).trim());

            const rawCreds = Array.isArray(rawCreditData) ? rawCreditData : [rawCreditData || ''];
            rawCreds.forEach(c => {
                if (typeof c === 'string') credits.push(...c.split(splitRegex));
                else credits.push(c);
            });
            credits = credits.map(s => String(s).trim());

            useEffect(() => {
                if (addLog) {
                    addLog(`[Media Viewer] Raw String: ${JSON.stringify(rawMediaData)}`);
                    addLog(`[Media Viewer] Parsed URLs: ${JSON.stringify(mediaItems)}`);
                    addLog(`[Media Viewer] Parsed Caps: ${JSON.stringify(captions)}`);
                }
            }, [activeSlide, addLog]);

            const getCleanUrl = (rawUrl) => {
                const url = rawUrl.trim();
                if (url.toLowerCase().startsWith('<iframe')) {
                    const match = url.match(/src=["']([^"']+)["']/);
                    return match ? match[1] : '#';
                }
                return url;
            };

            const handleTouchStart = (e) => {
                touchStartX.current = e.touches[0].clientX;
                isSwiping.current = false;
            };

            const handleTouchMove = (e) => {
                // If they drag finger more than 10px, flag it as a swipe to block the click
                if (Math.abs(e.touches[0].clientX - touchStartX.current) > 10) {
                    isSwiping.current = true;
                }
            };

            const handleWrapperClick = (e) => {
                if (!carouselRef.current || mediaItems.length <= 1) return;
                
                // Block click logic if the user was actively swiping natively
                if (isSwiping.current) {
                    isSwiping.current = false;
                    return;
                }

                const rect = e.currentTarget.getBoundingClientRect(); 
                const clickX = e.clientX - rect.left;
                const direction = clickX < rect.width / 2 ? -1 : 1;
                carouselRef.current.scrollBy({ left: direction * carouselRef.current.clientWidth, behavior: 'smooth' });
            };

            const renderMedia = (rawUrl, isMulti) => {
                const url = rawUrl.trim();

                if (url.toLowerCase().startsWith('<iframe')) {
                    return html`<div dangerouslySetInnerHTML=${{ __html: url }} style="flex-grow: 1; width: 100%; min-height: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; pointer-events: auto;"></div>`;
                }

                if (url.includes('youtube.com') || url.includes('youtu.be')) {
                    const videoId = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop().split('?')[0];
                    return html`<div style="flex-grow: 1; width: 100%; min-height: 0; display: flex;"><iframe src="https://www.youtube.com/embed/${videoId}" style="width:100%; height:100%; border:none;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
                }

                if (url.includes('google.com/maps/embed') || url.includes('googleusercontent.com/maps')) {
                     return html`<div style="flex-grow: 1; width: 100%; min-height: 0; display: flex;"><iframe src="${url}" style="width:100%; height:100%; border:none;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>`;
                }

                // [FIX: MED-25] Embedded Touch Collision Prevention math
                return html`
                    <div 
                        onClick=${isMulti ? handleWrapperClick : null}
                        onTouchStart=${handleTouchStart}
                        onTouchMove=${handleTouchMove}
                        style="flex-grow: 1; display: flex; width: 100%; min-height: 0; align-items: center; justify-content: center; cursor: ${isMulti ? 'ew-resize' : 'default'};"
                    >
                        <img src=${url} alt="Media" loading="lazy" style="max-width: 100%; max-height: 100%; object-fit: contain; pointer-events: none;" />
                    </div>
                `;
            };

            return html`
                <div style="position: relative; height: 100%; width: 100%;">
                    <style>
                        .media-carousel::-webkit-scrollbar { display: none !important; }
                    </style>
                    <div class="media-carousel" ref=${carouselRef} style="scrollbar-width: none; -ms-overflow-style: none; height: 100%; width: 100%; display: flex; overflow-x: auto; scroll-snap-type: x mandatory;">
                        ${mediaItems.map((rawUrl, i) => {
                            const cleanUrl = getCleanUrl(rawUrl);
                            const itemCaption = captions[i] || '';
                            const itemCredit = credits[i] || '';
                            const isMulti = mediaItems.length > 1;

                        const parts = str.split(' ');
                        if (parts.length < 1) return null;
                        const dParts = parts[0].split(/[/\-.]/);
                        const tParts = parts[1] ? parts[1].split(':') : [0,0,0];
                        const secParts = String(tParts[2] || '0').split('.');
                        
                        const d = parseInt(dParts[0], 10); const m = parseInt(dParts[1], 10) - 1; const y = parseInt(dParts[2], 10);
                        const h = parseInt(tParts[0], 10); const min = parseInt(tParts[1], 10); const sec = parseInt(secParts[0], 10); const ms = parseInt(secParts[1] || '0', 10);

                        const dateObj = new Date(y, m, d, h, min, sec, ms);
                        return isNaN(dateObj.getTime()) ? null : dateObj;
                    };

                    return {
                        id: index, title: exactGet(norm, 'title'),
                        startDate: dynamicDateParse(exactGet(norm, 'start')),
                        endDate: dynamicDateParse(exactGet(norm, 'end')),
                        description: exactGet(norm, 'description'),
                        place: exactGet(norm, 'place'), location: exactGet(norm, 'location'), priority: exactGet(norm, 'priority'),
                        media: exactGet(norm, 'media') ? exactGet(norm, 'media').split(omniSplitRegex).map(m => m.trim()).filter(Boolean) : [],
                        mediaCaption: exactGet(norm, 'media caption') ? exactGet(norm, 'media caption').split(omniSplitRegex).map(c => c.trim()) : [],
                        mediaCredit: exactGet(norm, 'media credit') ? exactGet(norm, 'media credit').split(omniSplitRegex).map(c => c.trim()) : [],
                        tags: exactGet(norm, 'tags') ? exactGet(norm, 'tags').split(',').map(t => t.trim()).filter(Boolean) : []
                    };
                });
                
                const valid = cleaned.filter(r => r.startDate).sort((a, b) => a.startDate.getTime() - b.startDate.getTime());
                setData(valid);

                if (!hasInitializedRef.current) {
                    const paramSlide = getOmniParam('slide');
                    const paramDate = getOmniParam('date');
                    let initialIdx = 0;

                    if (paramSlide && !isNaN(parseInt(paramSlide))) {
                        initialIdx = Math.max(0, Math.min(valid.length - 1, parseInt(paramSlide) - 1));
                    } else if (paramDate) {
                        const targetTime = new Date(paramDate).getTime();
                        if (!isNaN(targetTime)) {
                            let minDiff = Infinity;
                            valid.forEach((d, i) => {
                                if (d.startDate) {
                                    const diff = Math.abs(d.startDate.getTime() - targetTime);
                                    if (diff < minDiff) { minDiff = diff; initialIdx = i; }
                                }
                            });
                        }
                    }
                    setActiveIndex(initialIdx); 
                    hasInitializedRef.current = true;
                }

                setStatus({ text: 'Engine Ready', progress: 100, isFading: true, active: false });
                setTimeout(() => { setStatus({ text: '', progress: 100, isFading: true, active: true }); }, 500);

                            <rect x="119" y="75" width="4" height="6" rx="1" /><rect x="135" y="75" width="4" height="6" rx="1" /><rect x="151" y="75" width="4" height="6" rx="1" /><rect x="167" y="75" width="4" height="6" rx="1" />
                        </g>

                            <g fill="#fcfcfc" font-family="Arial, sans-serif" font-size="7" font-weight="normal" text-anchor="middle"><text x="0" y="-21">N</text><text x="24" y="2.5">E</text><text x="0" y="27">S</text><text x="-24" y="2.5">W</text></g>
                            <g fill="#8be9fd" filter="url(#dot-glow)"><circle cx="12.5" cy="-21.6" r="1.2" /><circle cx="21.6" cy="-12.5" r="1.2" /><circle cx="21.6" cy="12.5" r="1.2" /><circle cx="12.5" cy="21.6" r="1.2" /><circle cx="-12.5" cy="21.6" r="1.2" /><circle cx="-21.6" cy="12.5" r="1.2" /><circle cx="-21.6" cy="-12.5" r="1.2" /><circle cx="-12.5" cy="-21.6" r="1.2" /></g>

                            <circle cx="0" cy="0" r="1.5" fill="#fff" />
                        </g>
                    </svg>
                `;
                if (context === 'splash') return html`<div class="logo-stack-splash"><div class="splash-icon-wrapper">${svgIcon}</div><div class="splash-text">CarTiMapper</div><div class="splash-version">${appVersion}</div></div>`;
                if (context === 'status') return html`<div style="display: flex; align-items: center; gap: 4px;"><div style="width: 24px; height: 16px; display: flex; align-items: center;">${svgIcon}</div><span style="font-size: 0.8rem; color: #444; letter-spacing: -0.3px;">CarTiMapper</span><span style="font-size: 0.6rem; color: #888; margin-left: 4px;">${appVersion}</span></div>`;
                return html`<div class="logo-horizontal-about" style="flex-direction: column; align-items: flex-start; gap: 10px;"><div style="width: 200px; height: auto;">${svgIcon}</div></div>`;
            };

            const activeSlide = data[activeIndex];
            const hasMedia = activeSlide && activeSlide.media && activeSlide.media.length > 0;

            return html`
