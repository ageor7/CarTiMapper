    <style>
        /* === [ MAJOR BLOCK: GlobalStyles v4.11.0 ] === */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;1,400&display=swap');

        /* --- [ SubBlock: Root & Base ] --- */
        :root { --bg: #121212; --paneBg: #fcfcfc; --border: #ccc; --text: #222; --accent: #007acc; --coral: #f36c56; }
        body { margin: 0; font-family: 'Noto Sans', system-ui, sans-serif; font-weight: 400; overflow: hidden; background: var(--bg); color: var(--text); }
        /* --- [ End SubBlock: Root & Base ] --- */

        /* --- [ SubBlock: Splash & Loading ] --- */
        .loading-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--paneBg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease; opacity: 1; }
        .loading-screen.fade-out { opacity: 0; pointer-events: none; }
        .logo-stack-splash { display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem; }
        .splash-icon-wrapper { width: 350px; height: auto; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15)); }
        .splash-text { font-size: 2.8rem; color: #333; letter-spacing: -1px; line-height: 1; margin: 10px 0 0 0; text-align: center; width: 350px;}
        .splash-version { font-size: 1rem; color: #888; font-family: monospace; margin-top: 5px; letter-spacing: 1px; text-align: center;}
        .loading-bar-container { width: 250px; height: 4px; background: #ddd; border-radius: 2px; overflow: hidden; margin-top: 20px;}
        .loading-bar-fill { height: 100%; background: #007acc; transition: width 0.4s ease; }
        /* --- [ End SubBlock: Splash & Loading ] --- */

        /* --- [ SubBlock: Layout & Resizers ] --- */
        #tm-root { position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; display: flex; flex-direction: column; }
        #app-layout { --top-height: 35%; --map-width: 50%; --timeline-height: 15%; display: flex; flex-direction: column; flex: 1; width: 100vw; height: 100%; }
        .top-row { flex: 0 0 var(--top-height); height: var(--top-height); display: flex; background: #fff; overflow: hidden; }
        .map-pane { width: var(--map-width); flex-shrink: 0; background: #e0e0e0; position: relative; }
        .map-pane.no-media { width: 100% !important; }
        .resizer-v { height: 6px; background: #999; cursor: row-resize; flex-shrink: 0; z-index: 100; transition: background 0.2s; }
        .resizer-v:hover, .resizer-v:active { background: #007acc; }
        .resizer-h { width: 6px; background: #999; cursor: col-resize; flex-shrink: 0; z-index: 100; transition: background 0.2s; }
        .resizer-h:hover, .resizer-h:active { background: #007acc; }
        .media-pane { flex: 1; position: relative; overflow: hidden; background: #111; display: flex; flex-direction: column; }
        .content-pane-wrapper { flex: 1; position: relative; display: flex; flex-direction: column; background: var(--paneBg); overflow: hidden; }
        .timeline-pane { flex: 0 0 var(--timeline-height); height: var(--timeline-height); background: #ececec; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        /* --- [ End SubBlock: Layout & Resizers ] --- */

        /* --- [ SubBlock: Leaflet Map & Spatial HUD ] --- */

        .minimap-container { position: absolute; bottom: 50px; right: 15px; width: 160px; height: 110px; z-index: 1000; border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.3); border-radius: 4px; overflow: hidden; background: #e0e0e0; transition: transform 0.2s; }

        /* --- [ End SubBlock: Leaflet Map & Spatial HUD ] --- */

        /* --- [ SubBlock: Media Carousel ] --- */
        .media-carousel { flex: 1; display: flex; width: 100%; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .media-item { width: 100%; height: 100%; flex-shrink: 0; scroll-snap-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .media-content-wrapper { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .media-item img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.2s; }
        .media-item img:hover { transform: scale(1.01); }
        .media-item iframe { width: 100%; height: 100%; border: none; }
        
        .media-meta-box { width: 100%; background: #1a1a1a; color: #ddd; padding: 12px 15px; box-sizing: border-box; font-size: 0.85rem; border-top: 1px solid #333; z-index: 10; display: flex; flex-direction: column; gap: 4px; }

        /* --- [ End SubBlock: Media Carousel ] --- */

        /* --- [ SubBlock: Narrative Content Slider ] --- */
        .content-scroll-area { flex: 1; overflow-y: auto; padding: 2rem 4rem; display: flex; flex-direction: column; z-index: 5; }
        .slide-container { width: 100%; max-width: 1000px; margin: 0 auto; flex: 1; box-sizing: border-box; }
        .slide-header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
        .slide-date { color: #007acc; font-size: 1.1rem; letter-spacing: 0.5px; }

        .slide-title { margin: 0 0 1.5rem 0; font-size: 2.5rem; color: #111; line-height: 1.1; }

        .click-zone-left { left: 0; }
        .click-zone-right { right: 0; }
        /* --- [ End SubBlock: Narrative Content Slider ] --- */

        /* --- [ SubBlock: Status Bar & Modals ] --- */
        .unified-status-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: #fff; border-top: 1px solid #ddd; display: flex; align-items: center; padding: 0 15px; box-shadow: 0 -2px 5px rgba(0,0,0,0.02); z-index: 20; }
        .status-left { display: flex; align-items: center; gap: 10px; z-index: 2; }
        .status-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; align-items: center; z-index: 1; }
        .status-right { position: absolute; right: 15px; display: flex; align-items: center; font-size: 0.85rem; color: #666; gap: 10px; z-index: 2; }
        
        .status-btn { background: #eee; color: #444; border: 1px solid #ccc; border-radius: 12px; padding: 4px 12px; cursor: pointer; font-size: 0.75rem; transition: all 0.2s; font-family: inherit; }
        .status-btn:hover { background: #ddd; }
        .nav-btn-bottom { background: #f8f8f8; color: #333; border: 1px solid #ccc; border-radius: 4px; padding: 4px 15px; cursor: pointer; font-size: 0.85rem; transition: background 0.2s; font-family: inherit; }
        .nav-btn-bottom:hover:not(:disabled) { background: #e0e0e0; }

        .semantic-time-span { font-size: 0.75rem; color: #007acc; padding: 0 10px; border-left: 1px solid #ddd; border-right: 1px solid #ddd; margin: 0 5px; display: flex; align-items: center; height: 20px;}
        
        #about-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 700px; max-height: 85vh; background: #fff; z-index: 9001; border-radius: 12px; padding: 30px; overflow-y: auto; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #ccc; color: #222; font-size: 1.1rem; }
        #about-modal.open { display: block; }
        .about-close { position: absolute; top: 15px; right: 15px; border: none; background: none; font-size: 1.5rem; cursor: pointer; color: #999; }
        .logo-horizontal-about { display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        /* --- [ End SubBlock: Status Bar & Modals ] --- */

        /* --- [ SubBlock: Timeline UI & Leaflet Controls ] --- */
        .timeline-scroll-wrapper { width: 100%; height: 100%; overflow-y: hidden; overflow-x: auto; position: relative; display: flex; align-items: flex-start; cursor: grab; }
        .timeline-scroll-wrapper:active { cursor: grabbing; }
        .timeline-track-container { position: relative; height: 100%; }
        .tag-lane { border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; box-sizing: border-box; width: 100%; position: absolute; left: 0; right: 0; }
        .tag-lane-label { position: sticky; left: 0; z-index: 100; padding: 0 10px; font-size: 0.75rem; color: #555; display: flex; align-items: center; height: 100%; background: inherit; border-right: 1px solid #ccc; box-shadow: 2px 0 4px rgba(0,0,0,0.05);}
        .event-group { position: absolute; z-index: 10; transition: z-index 0.2s; display: flex; align-items: flex-start; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15)); }
        .event-group.active { z-index: 30; filter: drop-shadow(0 4px 6px rgba(0,122,204,0.4)); }
        
        /* [FIX: TL-UI-05] Restored v6.1.3 flat-edge geometry, trimmed internal whitespace by reducing vertical padding */
        .event-block { 
            display: flex; flex-direction: column; align-items: flex-start; justify-content: center; text-align: left; font-size: 0.75rem; cursor: pointer; transition: filter 0.2s ease; box-sizing: border-box;
            --diag-w: 10px; min-height: var(--lane-h); padding: 2px 12px 2px calc(var(--diag-w) + 8px); 
            clip-path: polygon( 0 calc(50% - (var(--lane-h) / 2) + 0.5px), var(--diag-w) 0, 100% 0, 100% 100%, var(--diag-w) 100%, 0 calc(50% + (var(--lane-h) / 2) - 0.5px) );
        }
        .event-block:hover { filter: brightness(1.05); z-index: 40; }
        .timeline-axis { position: absolute; bottom: 0; left: 0; right: 0; height: 28px; background: #e0e0e0; border-top: 2px solid #999; z-index: 5; }
        .timeline-ruler-tick { position: absolute; bottom: 3px; display: flex; flex-direction: column; align-items: center; z-index: 5; transform: translateX(-50%); font-size: 0.7rem; color: #555;}
        
        .timeline-leaflet-controls { position: absolute; top: 15px; right: 15px; z-index: 1000; display: flex; flex-direction: column; box-shadow: 0 1px 5px rgba(0,0,0,0.65); border-radius: 4px; background: #fff; border: 2px solid rgba(0,0,0,0.2); overflow: hidden; }
        .timeline-leaflet-btn { width: 34px; height: 34px; line-height: 34px; text-align: center; text-decoration: none; color: black; background: #fff; border-bottom: 1px solid #ccc; cursor: pointer; font-size: 1.2rem; user-select: none; transition: background 0.2s; }

        .timeline-leaflet-text { font-size: 0.65rem; line-height: 1; display: flex; align-items: center; justify-content: center; height: 24px; border-bottom: 1px solid #ccc; background: #fff; color: #333; }
        /* --- [ End SubBlock: Timeline UI & Leaflet Controls ] --- */

        /* --- [ SubBlock: Vibe Monitor UI ] --- */
        #vibe-monitor { position: absolute; bottom: 50px; left: 10px; width: 400px; height: 300px; background: rgba(10, 10, 15, 0.95); border: 1px solid #444; border-radius: 8px; display: flex; flex-direction: column; z-index: 9999; color: #eee; box-shadow: 0 8px 32px rgba(0,0,0,0.9); resize: both; overflow: hidden; font-family: monospace; }
        #vibe-header { background: #222; padding: 8px; cursor: move; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .vibe-close-btn { background: #ff5555; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; padding: 2px 6px; }
        #vibe-logs { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; line-height: 1.4; word-wrap: break-word; }
        .log-info { color: #8be9fd; } .log-success { color: #50fa7b; } .log-warn { color: #ffb86c; } .log-error { color: #ff5555; }

<body>
    <div id="root"></div>
    <script type="module">
        // === [ MAJOR BLOCK: Imports & Globals v1.0.52 ] ===
        import { h, render, Component } from 'https://esm.sh/preact';
        import { useState, useEffect, useLayoutEffect, useRef } from 'https://esm.sh/preact/hooks';
        import htm from 'https://esm.sh/htm';
        import Papa from 'https://esm.sh/papaparse';

        const html = htm.bind(h);
        const APP_VERSION = 'v6.4.6';
        document.title = `CarTiMapper Core - ${APP_VERSION}`; 
        const MODULE_VERSIONS = { Styles: 'v4.11.0', Globals: 'v1.0.52' }; 
        const TM_CONFIG = { timeZone: 'Europe/Athens', paneBackground: '#fcfcfc' };
        // === [ END MAJOR BLOCK: Imports & Globals v1.0.52 ] ===

        // === [ MAJOR BLOCK: Utilities v1.0.0 ] ===
        const stripHTML = (htmlStr) => {
            if (!htmlStr) return '';
            const tmp = document.createElement("DIV");
            tmp.innerHTML = htmlStr;
            return tmp.textContent || tmp.innerText || "";
        };
        // === [ END MAJOR BLOCK: Utilities v1.0.0 ] ===

        // === [ MAJOR BLOCK: ErrorBoundary v1.0.0 ] ===
        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) return html`<div style="padding:20px; color:red; font-family:monospace;"><h3>CarTiMapper Crash</h3><p>${this.state.error.toString()}</p></div>`;
                return this.props.children;
            }
        }
        // === [ END MAJOR BLOCK: ErrorBoundary v1.0.0 ] ===

        // === [ MAJOR BLOCK: VibeMonitor v2.0.0 ] ===
        // [FIX: DIAG-01] Added Active Sensor Telemetry block
        const VibeMonitor = ({ logs, status, isOpen, setIsOpen, activeSlide, appVersion, moduleVersions }) => {
            const logsEndRef = useRef(null);
            const monitorRef = useRef(null);
            const [isDragging, setIsDragging] = useState(false);
            const [pos, setPos] = useState({ x: 10, y: 50 }); 
            const dragStart = useRef({ x: 0, y: 0 });

            useEffect(() => { if (logsEndRef.current && isOpen) logsEndRef.current.scrollIntoView({ behavior: "smooth" }); }, [logs, isOpen]);

            const onMouseDown = (e) => {
                if (e.target.closest('.vibe-close-btn')) return;
                setIsDragging(true);
                dragStart.current = { x: e.clientX - pos.x, y: e.clientY - pos.y };
            };
            const onMouseMove = (e) => {
                if (!isDragging) return;
                let newX = e.clientX - dragStart.current.x; let newY = e.clientY - dragStart.current.y;
                setPos({ x: newX, y: newY });
            };
            const onMouseUp = () => setIsDragging(false);

            useEffect(() => {
                if (isDragging) { document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp); }
                else { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); }
                return () => { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); };
            }, [isDragging]);

            if (!isOpen) return null;
            return html`
                <div id="vibe-monitor" ref=${monitorRef} style="left: ${pos.x}px; bottom: ${pos.y}px;">
                    <div id="vibe-header" onMouseDown=${onMouseDown}>
                        <span>SYS MON | ${appVersion}</span>
                        <button class="vibe-close-btn" onClick=${() => setIsOpen(false)}>Close</button>
                    </div>
                    <div style="background: #111; padding: 6px 10px; border-bottom: 1px solid #333; font-size: 11px; color: #aaa;">

                const topNode = appRef.current.querySelector('.top-row');
                const startHeight = topNode.offsetHeight;
                const containerHeight = appRef.current.offsetHeight;
                const onMove = (e2) => {
                    const currentY = e2.touches ? e2.touches[0].clientY : e2.clientY;
                    let pct = ((startHeight + (currentY - startY)) / containerHeight) * 100;
                    if (pct < 10) pct = 10; if (pct > 80) pct = 80;
                    appRef.current.style.setProperty('--top-height', `${pct}%`);
                };
                const onUp = () => { 
                    document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); 
                    window.dispatchEvent(new Event('resize')); 
                };
                document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
            };

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const gid = urlParams.get('gid') || '0'; 
                const source = urlParams.get('source') || '1kdgGiHNDsIZrn8Z1aqWXrEEYKMGxLAqFiwATx3aqbJI';
                const fetchUrl = `https://docs.google.com/spreadsheets/d/${source}/gviz/tq?tqx=out:csv&gid=${gid}`;

                setStatus({ text: 'Fetching Data...', progress: 40, isFading: false, active: false });
                fetch(fetchUrl).then(res => res.text()).then(csvText => {
                    Papa.parse(csvText, {
                        header: true, skipEmptyLines: true,
                        complete: (results) => { setRawCsvRows(results.data); }
                    });
                });
            }, []);

            useEffect(() => {
                if (rawCsvRows.length === 0) return;
                const exactGet = (normObj, key) => { const val = normObj[key]; return val !== undefined && val !== null ? String(val).trim() : ""; };

                const cleaned = rawCsvRows.map((row, index) => {
                    const norm = {}; for (let k in row) norm[k.toLowerCase().trim()] = row[k];

                    const dynamicDateParse = (str) => {
                        if (!str) return null;
                        // Expected: dd/mm/yyyy HH:mm:ss.000
                        const parts = str.split(' ');
                        if (parts.length < 1) return null;
                        const dParts = parts[0].split(/[/\-.]/);
                        const tParts = parts[1] ? parts[1].split(':') : [0,0,0];
                        const secParts = String(tParts[2] || '0').split('.');
                        
                        const d = parseInt(dParts[0], 10);
                        const m = parseInt(dParts[1], 10) - 1;
                        const y = parseInt(dParts[2], 10);
                        const h = parseInt(tParts[0], 10);
                        const min = parseInt(tParts[1], 10);
                        const sec = parseInt(secParts[0], 10);
                        const ms = parseInt(secParts[1] || '0', 10);

                        const dateObj = new Date(y, m, d, h, min, sec, ms);
                        return isNaN(dateObj.getTime()) ? null : dateObj;
                    };

                    return {
                        id: index, 
                        title: exactGet(norm, 'title'),
                        startDate: dynamicDateParse(exactGet(norm, 'start')),
                        endDate: dynamicDateParse(exactGet(norm, 'end')),
                        description: exactGet(norm, 'description'),
                        place: exactGet(norm, 'place'),
                        location: exactGet(norm, 'location'),
                        priority: exactGet(norm, 'priority'),
                        media: exactGet(norm, 'media').split(';').map(m => m.trim()).filter(Boolean),
                        tags: exactGet(norm, 'tags').split(',').map(t => t.trim()).filter(Boolean)
                    };
                });
                
                const valid = cleaned.filter(r => r.startDate).sort((a, b) => a.startDate.getTime() - b.startDate.getTime());
                setData(valid);
                setStatus({ text: 'Engine Ready', progress: 100, isFading: true, active: true });
            }, [rawCsvRows]);

            const CarTiMapperLogo = ({ context, appVersion }) => html`<div style="font-weight:bold; color:#007acc">CarTiMapper ${appVersion}</div>`;

            return html`
                <div id="tm-root">
                    ${!status.active ? html`<div class="loading-screen">Loading...</div>` : html`
                        <div id="app-layout" ref=${appRef}>
                            <div class="top-row">
                                <div class="map-pane">
                                    <${MapViewer} data=${data} activeIndex=${activeIndex} setActiveIndex=${jumpToSlide} maxAutoZoom=${maxAutoZoom} />
                                </div>
                                <div class="resizer-h" onMouseDown=${startMapResize}></div>
                                <div class="media-pane">
                                    <${MediaViewer} activeSlide=${data[activeIndex]} />
                                </div>
                            </div>
                            <div class="resizer-v" onMouseDown=${startTopResize}></div>
                            <div class="content-slider-pane">
                                <${ContentSlider} data=${data} activeIndex=${activeIndex} setActiveIndex=${jumpToSlide} setIsAboutOpen=${setIsAboutOpen} setIsSettingsOpen=${setIsSettingsOpen} CarTiMapperLogo=${CarTiMapperLogo} visibleTimeSpan=${visibleTimeSpan} />
                            </div>
                            <div class="timeline-pane">
                                <${TimelineScrubber} data=${data} activeIndex=${activeIndex} setActiveIndex=${jumpToSlide} setVisibleTimeSpan=${setVisibleTimeSpan} />
                            </div>
                        </div>
                    `}
                </div>
            `;
        };
        MODULE_VERSIONS['AppOrchestrator'] = 'v1.35.0';

        // === [ MAJOR BLOCK: IgnitionSwitch v1.0.0 ] ===
        render(html`<${ErrorBoundary}><${App} /></${ErrorBoundary}>`, document.getElementById('root'));
        // === [ END MAJOR BLOCK: IgnitionSwitch v1.0.0 ] ===
    </script>
</body>
</html>
