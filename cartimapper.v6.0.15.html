        /* === [ MAJOR BLOCK: GlobalStyles v4.5.0 ] === */

<body>
    <div id="root"></div>
    <script type="module">
        // === [ MAJOR BLOCK: Imports & Globals v1.0.51 ] ===
        import { h, render, Component } from 'https://esm.sh/preact';
        import { useState, useEffect, useRef } from 'https://esm.sh/preact/hooks';
        import htm from 'https://esm.sh/htm';
        import Papa from 'https://esm.sh/papaparse';

        const html = htm.bind(h);
        const APP_VERSION = 'v6.0.22';
        document.title = `CarTiMapper Core - ${APP_VERSION}`; 
        const MODULE_VERSIONS = { Styles: 'v4.5.0', Globals: 'v1.0.51' }; 
        const TM_CONFIG = { timeZone: 'Europe/Athens', paneBackground: '#fcfcfc' };
        // === [ END MAJOR BLOCK: Imports & Globals v1.0.51 ] ===

        // === [ MAJOR BLOCK: Utilities v1.0.0 ] ===
        const stripHTML = (htmlStr) => {
            if (!htmlStr) return '';
            const tmp = document.createElement("DIV");
            tmp.innerHTML = htmlStr;
            return tmp.textContent || tmp.innerText || "";
        };
        // === [ END MAJOR BLOCK: Utilities v1.0.0 ] ===

        // === [ MAJOR BLOCK: ErrorBoundary v1.0.0 ] ===
        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) return html`<div style="padding:20px; color:red; font-family:monospace;"><h3>CarTiMapper Crash</h3><p>${this.state.error.toString()}</p></div>`;
                return this.props.children;
            }
        }
        // === [ END MAJOR BLOCK: ErrorBoundary v1.0.0 ] ===

        // === [ MAJOR BLOCK: VibeMonitor v1.0.0 ] ===
        const VibeMonitor = ({ logs, status, isOpen, setIsOpen }) => {
            const logsEndRef = useRef(null);
            const monitorRef = useRef(null);
            const [isDragging, setIsDragging] = useState(false);
            const [pos, setPos] = useState({ x: 10, y: 50 }); 
            const dragStart = useRef({ x: 0, y: 0 });

            useEffect(() => { if (logsEndRef.current && isOpen) logsEndRef.current.scrollIntoView({ behavior: "smooth" }); }, [logs, isOpen]);

            const onMouseDown = (e) => {
                if (e.target.closest('.vibe-close-btn')) return;
                setIsDragging(true);
                dragStart.current = { x: e.clientX - pos.x, y: e.clientY - pos.y };
            };
            const onMouseMove = (e) => {
                if (!isDragging) return;
                let newX = e.clientX - dragStart.current.x; let newY = e.clientY - dragStart.current.y;
                setPos({ x: newX, y: newY });
            };
            const onMouseUp = () => setIsDragging(false);

            useEffect(() => {
                if (isDragging) { document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp); }
                else { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); }
                return () => { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); };
            }, [isDragging]);

            if (!isOpen) return null;
            return html`
                <div id="vibe-monitor" ref=${monitorRef} style="left: ${pos.x}px; bottom: ${pos.y}px;">
                    <div id="vibe-header" onMouseDown=${onMouseDown}>
                        <span>SYSTEM LOGS - ${status}</span>
                        <button class="vibe-close-btn" onClick=${() => setIsOpen(false)}>Close</button>
                    </div>
                    <div id="vibe-logs">
                        ${logs.map((log, i) => html`<div key=${i} class="log-${log.type}"><span class="log-time">[${log.time}]</span> ${log.msg}</div>`)}
                        <div ref=${logsEndRef} />
                    </div>
                </div>
            `;
        };
        // === [ END MAJOR BLOCK: VibeMonitor v1.0.0 ] ===

        // === [ MAJOR BLOCK: MapViewer v3.12.0 ] ===
        const MapViewer = ({ data, activeIndex, setActiveIndex, addLog }) => {
            const mapDomRef = useRef(null);
            const mapInstance = useRef(null);
            const markerLayer = useRef(null); 
            const clusterLayer = useRef(null); 
            const markersRef = useRef({}); 
            const hasFitBounds = useRef(false);

            const createPinHtml = (isActive, isVip) => {
                const color = isActive ? '#28a745' : (isVip ? '#ffb300' : '#007acc');
                const scale = isActive ? 'scale(1.3)' : 'scale(1)';
                const z = isActive ? '1000' : '0';
                return `<div class="custom-map-pin" style="transform: ${scale}; z-index: ${z};">
                            <div class="pin-head" style="background: ${color};"></div>
                            <div class="pin-stem" style="background: ${isActive ? '#28a745' : '#333'}; width: ${isActive ? '3px' : '2px'};"></div>
                        </div>`;
            };

            const extractLayers = (layerObj) => {
                let layers = [];
                if (Array.isArray(layerObj)) layerObj.forEach(l => layers = layers.concat(extractLayers(l)));
                else if (layerObj && layerObj.eachLayer) layerObj.eachLayer(l => layers = layers.concat(extractLayers(l)));
                else if (layerObj) layers.push(layerObj);
                return layers;
            };

            useEffect(() => {
                if (mapDomRef.current && !mapInstance.current && window.L) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const initialZoom = urlParams.get('mapzoom') ? parseInt(urlParams.get('mapzoom')) : 2;
                    const map = L.map(mapDomRef.current, { zoomControl: false }).setView([20, 0], initialZoom);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OSM' }).addTo(map);
                    
                    markerLayer.current = L.featureGroup().addTo(map);
                    clusterLayer.current = L.markerClusterGroup({ maxClusterRadius: 40, spiderfyOnMaxZoom: true }).addTo(map);
                    mapInstance.current = map;
                    
                    if (window.ResizeObserver) {
                        const ro = new ResizeObserver(() => { setTimeout(() => { if (mapInstance.current) mapInstance.current.invalidateSize(); }, 50); });
                        ro.observe(mapDomRef.current.parentElement);
                    }
                }
            }, []);

            useEffect(() => {
                const map = mapInstance.current;
                if (!map || data.length === 0) return;
                markerLayer.current.clearLayers();
                clusterLayer.current.clearLayers();
                markersRef.current = {};
                let validMarkers = 0;

                data.forEach((item, idx) => {
                    const locStr = String(item.location || '').trim();
                    if (!locStr) return;
                    const activeLayersArray = []; 
                    let featureLayers = [];

                    try {

                            const coordMatch = locStr.match(/(-?\d+(?:\.\d+)?)[,\s]+(-?\d+(?:\.\d+)?)/);
                            if (coordMatch) {
                                const lat = parseFloat(coordMatch[1]);
                                const lon = parseFloat(coordMatch[2]);
                                if (!isNaN(lat) && !isNaN(lon)) featureLayers.push(L.marker([lat, lon]));
                            }
                        }

                        const subLabels = item.subLabels ? item.subLabels.split(/[|;]/).map(s=>s.trim()) : [];
                        const isVip = String(item.priority).trim().toUpperCase() === 'VIP';

                        featureLayers.forEach((layer, layerIdx) => {
                            if (layer.setStyle) layer.setStyle({ color: '#007acc', weight: 4 });
                            
                            if (layer instanceof L.Marker) {
                                layer.setIcon(L.divIcon({ className: 'custom-div-icon', html: createPinHtml(false, isVip), iconSize: [24, 34], iconAnchor: [12, 34] }));

                            if (layer instanceof L.Marker && !isVip) clusterLayer.current.addLayer(layer); 
                            else markerLayer.current.addLayer(layer); 

                            activeLayersArray.push(layer);
                            validMarkers++;
                        });

                        if (activeLayersArray.length > 0) markersRef.current[idx] = activeLayersArray; 
                    } catch(e) { console.error("Map Error Row", idx, e); }
                });

                setTimeout(() => {

            };

                if (!isDragging) return;

                const x = e.pageX - tlDomRef.current.offsetLeft;
                const walk = (x - startX) * 2;

                }
            }, [activeIndex, scale, data]);

            if (data.length === 0 || tags.length === 0) return null;

            // --- [ SubBlock: Lane & Axis Math ] ---
            const minDate = data.reduce((min, d) => d.startDate < min ? d.startDate : min, data[0].startDate).getTime();

            const timeSpan = Math.max(maxDate - minDate, 86400000);

                    const eT = event.endDate ? event.endDate.getTime() : sT + (86400000 * 3); 
                    const left = (sT - minDate) * PxPerMs + 100;
                    let right = (eT - minDate) * PxPerMs + 100;
                    const minW = 80; if ((right - left) < minW) right = left + minW;
                    const width = right - left;
                    
                    const collisionZoom = 10;
                    const contextZoom = 150;
                    let bestSubLane = 0;
                    let hasOverlap = true;

                    while (hasOverlap) {
                        hasOverlap = false;
                        for (let p of placed) {
                            if (p.subLane === bestSubLane && left < p.right + collisionZoom && right > p.left - contextZoom) {
                                hasOverlap = true;
                                bestSubLane++;
                                break;
                            }
                        }
                    }
                    placed.push({ ...event, left, right, width, subLane: bestSubLane });
                });

                const maxSubLanes = placed.reduce((max, p) => Math.max(max, p.subLane), 0) + 1;
                return { ...lane, events: placed, height: maxSubLanes * laneHeight };

                const laneData = { ...l, y: currentY };
                currentY += l.height;

            const totalHeight = currentY + 30; 

            const getTickInterval = () => {
                const msPerViewport = (window.innerWidth / PxPerMs);

                if (days < 5) return { unit: 'day', ms: 86400000, fmt: (d) => d.toLocaleDateString([], { month: 'short', day: 'numeric' }) };
                if (days < 30) return { unit: 'week', ms: 86400000 * 7, fmt: (d) => d.toLocaleDateString([], { month: 'short', day: 'numeric' }) };
                if (days < 180) return { unit: 'month', ms: 86400000 * 30.44, fmt: (d) => d.toLocaleDateString([], { month: 'short', year: 'numeric' }) };
                if (days < 1825) return { unit: 'year', ms: 86400000 * 365.25, fmt: (d) => d.getFullYear().toString() };
                return { unit: 'decade', ms: 86400000 * 365.25 * 10, fmt: (d) => d.getFullYear().toString() };

            let tickTime = minDate - (minDate % tickConfig.ms);

                if (fetchUrl.includes('http')) {
                    if (fetchUrl.includes('/e/2PACX')) fetchUrl = fetchUrl.split('/pub')[0] + '/pub?output=csv';
                    else if (fetchUrl.includes('/d/')) fetchUrl = `https://docs.google.com/spreadsheets/d/${fetchUrl.match(/\/d\/([a-zA-Z0-9-_]+)/)[1]}/gviz/tq?tqx=out:csv&gid=${gid}`;
                } else {
                    fetchUrl = fetchUrl.startsWith('2PACX') ? `https://docs.google.com/spreadsheets/d/e/${fetchUrl}/pub?output=csv&gid=${gid}` : `https://docs.google.com/spreadsheets/d/${fetchUrl}/gviz/tq?tqx=out:csv&gid=${gid}`;
                }

                setStatus({ text: 'Fetching Source Data...', progress: 40, isFading: false, active: false });
                
                fetch(fetchUrl).then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.text();
                }).then(csvText => {
                    setStatus({ text: 'Downloading Matrix...', progress: 80, isFading: false, active: false });
                    
                    Papa.parse(csvText, {
                        header: true, skipEmptyLines: true,
                        complete: (results) => {
                            if (results.data.length === 0) return setStatus({ text: 'Empty Dataset Error', progress: 0, isFading: false, active: false });
                            
                            const exactGet = (normObj, key) => {
                                const val = normObj[key];
                                return val !== undefined && val !== null ? String(val).trim() : "";
                            };

                            const firstRowNorm = {};
                            if (results.data[0]) {
                                for (let k in results.data[0]) firstRowNorm[k.toLowerCase().trim()] = results.data[0][k];
                            }
                            
                            setAboutData({ 
                                title: exactGet(firstRowNorm, 'title') || 'About', 
                                description: exactGet(firstRowNorm, 'description') || 'No project description provided.',
                                rawSource: rawSource === defaultDb ? 'Default Master DB' : rawSource
                            });

                            // [FIX: ARCH-01] Commit the raw data to Stage 1 Cache. Do not parse yet.
                            setRawCsvRows(results.data);
                        },
                        error: (err) => { addLog(`Parse Error: ${err.message}`, 'error'); setStatus({ text: `Parse Failed: ${err.message}`, progress: 0, isFading: false, active: false }); }
                    });
                }).catch(err => { addLog(`Fetch failed: ${err.message}`, 'error'); setStatus({ text: `Connection Failed: ${err.message}`, progress: 0, isFading: false, active: false }); });
            }, []);
            // --- [ End SubBlock: Stage 1 - Network Ingestion ] ---

            // --- [ SubBlock: Stage 2 - Dynamic Compilation Engine ] ---
            useEffect(() => {
                if (rawCsvRows.length === 0) return;
                
                setStatus({ text: 'Compiling Timeline...', progress: 90, isFading: false, active: false });

                const exactGet = (normObj, key) => {
                    const val = normObj[key];
                    return val !== undefined && val !== null ? String(val).trim() : "";
                };

                const cleaned = rawCsvRows.map((row, index) => {
                    const norm = {};
                    for (let k in row) norm[k.toLowerCase().trim()] = row[k];

                    // [FIX: DATE-11 & 12] Isolate HH:mm:ss and Dynamically Route array bounds based on user format
                    const dynamicDateParse = (str, format) => {
                        if (!str) return null;
                        
                        // 1. Isolate the time payload via whitespace
                        const splitArr = str.trim().split(/\s+/);
                        const dStr = splitArr[0];
                        const tStr = splitArr.length > 1 ? splitArr.slice(1).join(' ') : "";
                        
                        const dParts = dStr.split(/[/\-.]/);
                        if (dParts.length === 3) {
                            let d, m, y;
                            
                            // 2. Route the date matrix
                            if (format === 'DD/MM/YYYY') {
                                d = parseInt(dParts[0], 10); m = parseInt(dParts[1], 10) - 1; y = parseInt(dParts[2], 10);
                            } else if (format === 'MM/DD/YYYY') {
                                m = parseInt(dParts[0], 10) - 1; d = parseInt(dParts[1], 10); y = parseInt(dParts[2], 10);
                            } else if (format === 'YYYY/MM/DD') {
                                y = parseInt(dParts[0], 10); m = parseInt(dParts[1], 10) - 1; d = parseInt(dParts[2], 10);
                            }

                            // 3. Preserve Time down to the second
                            let h = 0, min = 0, sec = 0;
                            if (tStr) {
                                const tParts = tStr.split(':');
                                h = parseInt(tParts[0], 10) || 0;
                                min = parseInt(tParts[1], 10) || 0;
                                sec = parseInt(tParts[2], 10) || 0;
                            }
                            
                            const finalDate = new Date(y, m, d, h, min, sec);
                            if (!isNaN(finalDate.getTime())) return finalDate;
                        }
                        
                        let fallback = new Date(str); 
                        return isNaN(fallback.getTime()) ? null : fallback;
                    };

                    const rawTags = exactGet(norm, 'tags');
                    const parsedTags = rawTags ? rawTags.split(',').map(t=>t.trim()).filter(t => t !== "") : [];

                    const rawMedia = exactGet(norm, 'media');
                    const parsedMedia = rawMedia ? rawMedia.split(',').map(x=>x.trim()).filter(x => x !== "") : [];
                    
                    const placeVal = exactGet(norm, 'place');

                    return {
                        id: index, 
                        title: exactGet(norm, 'title') || `Event ${index + 1}`,
                        startDate: dynamicDateParse(exactGet(norm, 'start'), dateFormat),
                        endDate: dynamicDateParse(exactGet(norm, 'end'), dateFormat),
                        description: exactGet(norm, 'description'),
                        place: placeVal,
                        subLabels: placeVal, 
                        location: exactGet(norm, 'location'),
                        priority: exactGet(norm, 'priority'),
                        media: parsedMedia,
                        mediaCaption: exactGet(norm, 'media caption'),
                        mediaCredit: exactGet(norm, 'media credit'),
                        tags: parsedTags
                    };
                });
                
                const valid = cleaned.filter(r => r.startDate).sort((a, b) => {
                    const timeDiff = a.startDate.getTime() - b.startDate.getTime();
                    return timeDiff !== 0 ? timeDiff : a.id - b.id;
                });

                const finalData = [...valid, ...cleaned.filter(r => !r.startDate)];
                setData(finalData);

                // Run URL routing strictly ONCE during initial load to prevent slide-jumping during format toggling
                if (!hasInitializedRef.current) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const paramSlide = urlParams.get('slide');
                    const paramDate = urlParams.get('date');
                    let initialIdx = 0;

                    if (paramSlide && !isNaN(parseInt(paramSlide))) {
                        initialIdx = Math.max(0, Math.min(finalData.length - 1, parseInt(paramSlide) - 1));
                    } else if (paramDate) {
                        const targetTime = new Date(paramDate).getTime();
                        if (!isNaN(targetTime)) {
                            let minDiff = Infinity;
                            valid.forEach((d, i) => {
                                if (d.startDate) {
                                    const diff = Math.abs(d.startDate.getTime() - targetTime);
                                    if (diff < minDiff) { minDiff = diff; initialIdx = i; }
                                }
                            });
                        }
                    }
                    setActiveIndex(initialIdx); 
                    hasInitializedRef.current = true;
                }
                
                setStatus({ text: `Success! Compiled ${cleaned.length} records.`, progress: 100, isFading: true, active: false });
                setTimeout(() => { setStatus({ text: '', progress: 100, isFading: true, active: true }); }, 500);

            }, [rawCsvRows, dateFormat]); 
            // --- [ End SubBlock: Stage 2 - Dynamic Compilation Engine ] ---

            const activeSlide = data[activeIndex];
            const hasMedia = activeSlide?.media?.length > 0;

            const CarTiMapperLogo = ({ context }) => {
                const svgIcon = html`
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="20 0 165 100" style="width: 100%; height: auto; display: block;">
                        <defs>
                            <filter id="dot-glow" x="-50%" y="-50%" width="200%" height="200%">
                                <feGaussianBlur stdDeviation="1.2" result="blur" />
                                <feMerge><feMergeNode in="blur" /><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
                            </filter>
                        </defs>
                        <path d="M28,38 L45,15 L180,15 L180,85 L45,85 L28,62 Z" fill="#222" stroke="#007acc" stroke-width="2.5" stroke-linejoin="round"/>
                        <g fill="#fff" opacity="0.9">
                            <rect x="55" y="19" width="4" height="6" rx="1" /><rect x="71" y="19" width="4" height="6" rx="1" /><rect x="87" y="19" width="4" height="6" rx="1" /><rect x="103" y="19" width="4" height="6" rx="1" />
                            <rect x="119" y="19" width="4" height="6" rx="1" /><rect x="135" y="19" width="4" height="6" rx="1" /><rect x="151" y="19" width="4" height="6" rx="1" /><rect x="167" y="19" width="4" height="6" rx="1" />
                            <rect x="55" y="75" width="4" height="6" rx="1" /><rect x="71" y="75" width="4" height="6" rx="1" /><rect x="87" y="75" width="4" height="6" rx="1" /><rect x="103" y="75" width="4" height="6" rx="1" />
                            <rect x="119" y="75" width="4" height="6" rx="1" /><rect x="135" y="75" width="4" height="6" rx="1" /><rect x="151" y="75" width="4" height="6" rx="1" /><rect x="167" y="75" width="4" height="6" rx="1" />
                        </g>
                        <g transform="translate(112, 50)">
                            <path d="M0,-28 L4,-6 L28,0 L4,6 L0,28 L-4,6 L-28,0 L-4,-6 Z" fill="#444" opacity="0.8"/>
                            <g fill="#fcfcfc" font-family="Arial, sans-serif" font-size="7" font-weight="normal" text-anchor="middle">
                                <text x="0" y="-21">N</text><text x="24" y="2.5">E</text><text x="0" y="27">S</text><text x="-24" y="2.5">W</text>
                            </g>
                            <g fill="#8be9fd" filter="url(#dot-glow)">
                                <circle cx="12.5" cy="-21.6" r="1.2" /><circle cx="21.6" cy="-12.5" r="1.2" />
                                <circle cx="21.6" cy="12.5" r="1.2" /><circle cx="12.5" cy="21.6" r="1.2" />
                                <circle cx="-12.5" cy="21.6" r="1.2" /><circle cx="-21.6" cy="12.5" r="1.2" />
                                <circle cx="-21.6" cy="-12.5" r="1.2" /><circle cx="-12.5" cy="-21.6" r="1.2" />
                            </g>
                            <g transform="rotate(60)"><path d="M0,0 L-1,-16 L1,-16 Z" fill="#999" /><circle cx="0" cy="-20" r="2.8" fill="#007acc" /></g>
                            <g transform="rotate(270)"><path d="M0,0 L-1.2,-9 L1.2,-9 Z" fill="#999" /><circle cx="0" cy="-13" r="2.8" fill="#28a745" /></g>
                            <circle cx="0" cy="0" r="1.5" fill="#fff" />
                        </g>
                    </svg>
                `;

                if (context === 'splash') return html`<div class="logo-stack-splash"><div class="splash-icon-wrapper">${svgIcon}</div><div class="splash-text">CarTiMapper</div><div class="splash-version">${APP_VERSION}</div></div>`;
                if (context === 'status') return html`<div style="display: flex; align-items: center; gap: 6px;"><div style="width: 24px; height: 16px; display: flex; align-items: center;">${svgIcon}</div><span style="font-weight: 700; font-size: 0.8rem; color: #444; letter-spacing: -0.3px;">CarTiMapper</span></div>`;
                return html`<div class="logo-horizontal-about" style="flex-direction: column; align-items: flex-start; gap: 10px;"><div style="width: 200px; height: auto;">${svgIcon}</div></div>`;
            };

            // --- [ SubBlock: Master Render ] ---
            return html`
                <div id="tm-root">
                    ${!status.active ? html`
                        <div class="loading-screen ${status.isFading ? 'fade-out' : ''}">
                            <${CarTiMapperLogo} context="splash" />
                            <div class="loading-bar-container"><div class="loading-bar-fill" style="width: ${status.progress}%;"></div></div>
                        </div>
                    ` : ''}

                    ${data.length > 0 ? html`
                        <div id="app-layout" ref=${appRef}>
                            <div class="top-row">
                                <div class="map-pane ${!hasMedia ? 'no-media' : ''}">
                                    <${MapViewer} data=${data} activeIndex=${activeIndex} setActiveIndex=${jumpToSlide} addLog=${addLog} />
                                    <${VibeMonitor} logs=${logs} status=${status.text} isOpen=${isMonitorOpen} setIsOpen=${setIsMonitorOpen} />
                                </div>
                                ${hasMedia ? html`<div class="resizer-h" onMouseDown=${startMapResize} onTouchStart=${startMapResize}></div>` : ''}
                                <div class="media-pane" style="display: ${hasMedia ? 'flex' : 'none'};">
                                    <${MediaViewer} activeSlide=${activeSlide} />
                                </div>
                            </div>

                            <div class="resizer-v" onMouseDown=${startTopResize} onTouchStart=${startTopResize}></div>
                            
                            <${ContentSlider} data=${data} activeIndex=${activeIndex} setActiveIndex=${jumpToSlide} slideHistory=${slideHistory} goBack=${goBack} aboutData=${aboutData} isAboutOpen=${isAboutOpen} setIsAboutOpen=${setIsAboutOpen} isMonitorOpen=${isMonitorOpen} setIsMonitorOpen=${setIsMonitorOpen} isSettingsOpen=${isSettingsOpen} setIsSettingsOpen=${setIsSettingsOpen} CarTiMapperLogo=${CarTiMapperLogo} />
                            
                            <div class="resizer-v" onMouseDown=${startTimelineResize} onTouchStart=${startTimelineResize}></div>

                            <div class="timeline-pane">
                                <${TimelineScrubber} data=${data} activeIndex=${activeIndex} setActiveIndex=${jumpToSlide} />
                            </div>
                        </div>

                        <div class="modal-backdrop ${isAboutOpen ? 'open' : ''}" onClick=${() => setIsAboutOpen(false)}></div>
                        <div id="about-modal" class=${isAboutOpen ? 'open' : ''}>
                            <button class="about-close" onClick=${() => setIsAboutOpen(false)}>×</button>
                            <${CarTiMapperLogo} context="about" />
                            <div style="text-align: center; margin-bottom: 25px;">
                                <button class="status-btn" style="padding: 10px 20px; font-size: 1rem; background: #007acc; color: #fff; border: none; font-weight: bold;" onClick=${() => { jumpToSlide(0); setIsAboutOpen(false); }}>View Project Overview (Slide 1)</button>
                            </div>
                            <div dangerouslySetInnerHTML=${{__html: aboutData.description}}></div>
                        </div>

                        <div class="modal-backdrop ${isSettingsOpen ? 'open' : ''}" onClick=${() => setIsSettingsOpen(false)}></div>
                        <div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 450px; background: #fff; z-index: 9002; border-radius: 12px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); color: #222; display: ${isSettingsOpen ? 'block' : 'none'};">
                            <button class="about-close" onClick=${() => setIsSettingsOpen(false)}>×</button>
                            <h3 style="margin-top: 0; color: #333; font-size: 1.5rem; border-bottom: 1px solid #eee; padding-bottom: 10px;">Engine Settings</h3>
                            
                            <div style="margin-top: 20px;">
                                <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #555; font-size: 0.95rem;">Data Locale Format</label>
                                <select style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 1rem; background: #fcfcfc; cursor: pointer; color: #333;" 
                                        value=${dateFormat} 
                                        onChange=${(e) => setDateFormat(e.target.value)}>
                                    <option value="DD/MM/YYYY">European / Global (DD/MM/YYYY)</option>
                                    <option value="MM/DD/YYYY">United States (MM/DD/YYYY)</option>
                                    <option value="YYYY/MM/DD">Scientific / ISO (YYYY/MM/DD)</option>
                                </select>
                                <p style="font-size: 0.85rem; color: #666; margin-top: 12px; line-height: 1.5;">Select the exact format your spreadsheet uses. The Timeline Engine will instantly re-compile the dataset upon selection to prevent chronological corruption.</p>
                            </div>
                        </div>

                    ` : ''}
                </div>
            `;
            // --- [ End SubBlock: Master Render ] ---
        };
        MODULE_VERSIONS['AppOrchestrator'] = 'v1.30.0';
        // === [ END MAJOR BLOCK: AppOrchestrator v1.30.0 ] ===

        // === [ MAJOR BLOCK: IgnitionSwitch v1.0.0 ] ===
        render(html`<${ErrorBoundary}><${App} /></${ErrorBoundary}>`, document.getElementById('root'));
        // === [ END MAJOR BLOCK: IgnitionSwitch v1.0.0 ] ===
    </script>
</body>
</html>
